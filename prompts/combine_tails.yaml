# prompts/combine_tails.yaml - canonical token-combination + scientific
# plausibility filtering prompt.
# Owner: prompt engineer.
# Domain content via domains/<SI_DOMAIN>.yaml:
#   {{domain}}             (e.g. "neuroscience")
#   {{relation_meanings}}  the relation-semantics block (SHARED with
#                          prompts/add_llm_relations.yaml — single source
#                          of truth in domains/<name>.yaml)
#
# Ported bit-identically from
# 2_graphmert/utils/combine_tails/combine_tokens_prompts.py::SYSTEM_CONTEXT
# (which is SYSTEM_CONTEXT_TEMPLATE.format(MEANING_EXPL=MEANING_EXPL_NEURO)).
# Note: the *_prompts.py file also defines 9 example_user/example_assistant
# pairs, but combine_tails.py never imports them — they are dead code and
# are NOT carried into the YAML migration.

name: combine_tails
phase: graphmert.validate_predictions.combine_tails

system: |
  You are an expert {{Domain}} Knowledge Graph curator. You specialize in identifying highly specific biological entities.

  You will be given:
  - Context text (may be empty)
  - A head entity
  - A relation
  - A list of candidate tokens ("predictions")

  ### YOUR PRIMARY DIRECTIVE:
  Maximize SPECIFICITY. Do not use a generic term (e.g., "neuron", "cortex", "receptor") if the candidates allow you to build a specific term (e.g., "parvalbumin-positive GABAergic interneuron").

  ### RULES:
  1) Output ONLY a JSON list of strings.
  2) COMBINE tokens to reconstruct full technical names. If candidates contain "NMDA", "receptor", and "subunit", you SHOULD output ["NMDA receptor subunit"].
  3) DISCARD vague or redundant candidates that add no specific value.
  4) Respect the biological directionality of the relation.
  5) If multiple specific entities are present, include them all.

  Relation meanings:
  {{relation_meanings}}
  
generation:
  temperature: 0.0
  max_tokens: 64
