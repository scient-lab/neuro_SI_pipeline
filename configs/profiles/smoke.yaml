# configs/profiles/smoke.yaml - smallest reproducible end-to-end run.
# Target: ~300 input examples, fits on a single 12 GB GPU (RTX 3060 / A4000).
#
# Calibrated against the medical-pipeline smoke debugging session that ate
# half a day on key-mismatch + OOM. Every key below was verified to match
# what the consuming code actually reads (see comments next to each section).

models:
  # default.yaml::models.extract is Qwen/Qwen3-14B (~28 GB fp16) — too big
  # for smoke-tier GPUs (16-24 GB). Qwen3 also has NO native vllm-0.7.3
  # implementation, so it would fall back to the slow HF Transformers backend
  # even if it fit. Qwen2.5-3B-Instruct: ~6 GB fp16, vllm-native, fits
  # everywhere including the 12 GB RTX 3060 workstation. Smoke validates
  # pipeline plumbing, not extraction quality — pilot/paper inherit Qwen3-14B.
  extract: Qwen/Qwen2.5-3B-Instruct

extract:
  max_input_examples: 300
  # Smoke runs on 12-16 GB cards (3060 / A4000) with the small Qwen2.5-3B
  # extract model. Snug max_model_len gives KV cache room for more
  # concurrent prompts at this scale.
  max_model_len: 2048
  # Smoke-scale input corpus (committed to the repo for reproducibility).
  # 10 Wikipedia neuroscience articles, ~360 KB total. See README in that
  # directory for provenance and regeneration instructions.
  #
  # NOT YET WIRED (2026-06-15): graphrag_index.py reads input from
  # 1_seed_kg/settings.yaml::input.base_dir. Set that to the path below
  # until the args_mlm/settings.yaml integration lands (deferred from
  # the orchestration branch — see kg-pipeline/.claude/docs).
  input_dir: corpus/neuroscience/smoke

# graphmert: architecture inherits Recipe B from default.yaml
# (6L/4H/256H/1024FFN, scalar LR 4e-4) — that combination was validated
# to fit RTX 3060 12 GB on the medical pipeline. Smoke just shrinks epochs.
graphmert:
  train_epochs: 2
  effective_batch_size: 8
  # NOTE: most graphmert TRAINING knobs still live in
  # 2_graphmert/launch_configs/args_mlm.yaml (a HuggingFace argparse YAML).
  # The block below is the partial integration: 2_graphmert/utils/architecture.py
  # reads graphmert.config.root_nodes/num_leaves from here at import time
  # so mlm_utils / dataset_preprocessing_utils / predict_tails stay in sync.
  config:
    # Graph-structure invariants — match upstream commit 2d7b782 (Jake's
    # defaults). Smoke can shrink these later if needed to fit RTX 3060;
    # for now bit-identical to upstream.
    root_nodes: 512
    num_leaves: 3
    # max_nodes is DERIVED in architecture.py as root_nodes * (1 + num_leaves) — do not set

curriculum:
  # Drop from 100 -> 20: smoke validates plumbing, not coverage. At
  # default thinking_budget=4096, 100q ran 3h on RTX 3060 (2026-06-22).
  num_questions: 20
  hop_range: [1, 3]
  # Drop from 4096 -> 512 for ~8x faster per-call latency. NOT zero —
  # Jha mandate (2026-06-04) requires reasoning at every stage; we're
  # trimming, not removing.
  thinking_budget: 512
  # Drop from 100 -> 5: at 20 questions total, a crash at q=19 with
  # checkpoint_every=100 would lose all work.
  checkpoint_every: 5

# sft: keys match 3_si_curriculum/training/trainer.py::TrainingConfig fields
# that are wired via get_phase_param (lora_r, lora_alpha, lora_dropout,
# block_size). Anything else (epochs, batch_size) goes via CLI flags to the
# HF Trainer — not in this YAML.
sft:
  block_size: 4096          # default 32768 OOMs on 12 GB; 4k is enough for smoke

# rl: keys match 3_si_curriculum/RL/rl_training.py::TrainingConfig.
# DO NOT use n_completions / max_completion_tokens — those names existed in
# an earlier draft and are silently ignored. The wired names are
# num_generations and max_completion_length.
rl:
  num_generations: 2
  max_completion_length: 256
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  eval_steps: 25
  save_steps: 50
  # Single-GPU smoke: paper-grade default.yaml has use_deepspeed=true +
  # use_lora=false (multi-GPU + ZeRO-3, full fine-tune). Smoke flips
  # both — ZeRO-3 needs multi-GPU; without LoRA, GRPOTrainer doubles
  # memory by keeping a separate ref_model. Memory entry
  # [Stage 3 RL 12GB gotchas] documents LoRA-on-RL as the fork-patch
  # required to fit GRPO on a single 12-24 GB GPU.
  use_deepspeed: false
  use_lora: true

# RunPod hardware defaults for this scale (read by scripts/runpod/launch.sh).
# A4000 (16 GB) is one tier above the 3060 (12 GB) so it has more headroom —
# but the config above is calibrated for 12 GB so the same profile works on
# either box.
runpod:
  # Primary GPU selection: dynamic discovery. scripts/runpod/launch.sh queries
  # GET /v1/gpus, filters by this VRAM range and cloud_type, sorts cheapest
  # first, and attempts each in order (so we pick the cheapest available
  # instead of failing on a single hardcoded type).
  vram_gb_min: 16
  vram_gb_max: 24      # 16-24 GB covers the smoke workload; 0 = no upper bound
  # Static fallback: used only if discovery returns empty / API hiccup.
  # Keep this list curated even when relying on discovery.
  gpu_types:
    - "NVIDIA RTX A4000"
    - "NVIDIA RTX 3090"
    - "NVIDIA RTX A5000"
    - "NVIDIA RTX 4090"
    - "NVIDIA L4"
  cloud_type: COMMUNITY
  disk_gb: 60
  num_gpus: 1
  expected_runtime_min: 60
  approx_cost_usd: 0.5
  notes: "End-to-end orchestration + uv venv bootstrap on a real GPU."
