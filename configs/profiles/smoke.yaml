# configs/profiles/smoke.yaml - smallest reproducible end-to-end run.
# Target: ~300 input examples, fits on a single 24 GB GPU, completes in minutes.

extract:
  max_input_examples: 300

graphmert:
  train_epochs: 2
  effective_batch_size: 8

curriculum:
  num_questions: 100
  hop_range: [1, 3]

sft:
  train_epochs: 1
  effective_batch_size: 4

rl:
  n_completions: 2
  max_completion_tokens: 256

# RunPod hardware defaults for this scale (read by scripts/launch_runpod.sh).
runpod:
  gpu_type: "NVIDIA RTX A4000"
  cloud_type: COMMUNITY
  disk_gb: 60
  num_gpus: 1
  expected_runtime_min: 60
  approx_cost_usd: 0.5
  notes: "End-to-end orchestration + uv venv bootstrap on a real GPU."
