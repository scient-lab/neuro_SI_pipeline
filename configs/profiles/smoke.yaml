# configs/profiles/smoke.yaml - full pipeline validation on single GPU.
# Target: ~300-500 input examples → ~100 curriculum Q&A pairs → ~50-100 SFT examples.
# Validates all 6 phases work end-to-end. Fits on a single 32-48 GB GPU (L40S/L40/A6000/A40).
#
# Model SIZES are scaled to 8B for speed (extract / predict_tails / SFT student),
# but the two-LLM consensus steps keep a DISTINCT second model (Mistral-Nemo) so
# validation BEHAVIOR matches pilot/paper. Differs from pilot in scale, not logic.
# Every key below verified to match the consuming code (see comments).

models:
  # Qwen/Qwen3-8B: ~16 GB fp16, vllm-native, good fidelity balance for smoke.
  # Closer to Qwen3-14B behavior than 3B; catches extraction issues that 3B would miss.
  # Requires 24 GB GPU minimum (8B model + KV cache + batch overhead).
  extract: Qwen/Qwen3-8B
  # Phase 2 validation: TWO DISTINCT models for genuine consensus. fact_score.py
  # loads them SEQUENTIALLY (del llm between scoring passes), so peak VRAM =
  # max(model), not the sum — both fit on a 48 GB card. validate_a stays 8B for
  # smoke speed; validate_b is Mistral-Nemo so the two-LLM agreement is real
  # (not one model agreeing with itself, which is what 8B+8B was doing).
  validate_a: Qwen/Qwen3-8B
  validate_b: mistralai/Mistral-Nemo-Instruct-2407
  # Phase 3 tail prediction: default.yaml uses Qwen3-14B (28GB). Use 8B for smoke.
  predict_tails: Qwen/Qwen3-8B
  # Phase 4 curriculum final checks: same two-distinct-model logic as validate.
  # check_a stays 8B (speed); check_b is Mistral-Nemo for genuine consensus.
  curriculum_check_a: Qwen/Qwen3-8B
  curriculum_check_b: mistralai/Mistral-Nemo-Instruct-2407
  # Phase 5 SFT base model: default.yaml uses Qwen3-14B (~28GB fp16). Smoke's VRAM
  # band starts at 32GB, so a 14B SFT+LoRA can OOM if discovery lands a low-end card.
  # Keep SFT/RL at 8B for consistency with the downgraded inference models above —
  # smoke validates wiring, not training quality. RL builds on the SFT merged output,
  # so this keeps the whole train tail at 8B too.
  base_sft: Qwen/Qwen3-8B

extract:
  max_input_examples: 500
  # 500 input docs → ~200-300 triples → ~100-150 curriculum Q&A → ~50-100 SFT examples.
  # Ensures downstream stages (SFT, RL) have minimum viable data to exercise code paths.
  # NOTE: max_model_len inherits default.yaml's 20000. A prior 4096 override
  # truncated Qwen3's <think> block before the JSON was ever emitted → only 3
  # triples from 70 chunks (smoke 2026-06-25). Do NOT re-cap below ~16k while
  # extract_triples_no_think is false (thinking ON).
  # Smoke-scale input corpus (committed to the repo for reproducibility).
  # 10 Wikipedia neuroscience articles, ~360 KB total. See README in that
  # directory for provenance and regeneration instructions.
  #
  # NOT YET WIRED (2026-06-15): graphrag_index.py reads input from
  # 1_seed_kg/settings.yaml::input.base_dir. Set that to the path below
  # until the args_mlm/settings.yaml integration lands (deferred from
  # the orchestration branch — see kg-pipeline/.claude/docs).
  input_dir: corpus/neuroscience/smoke

# graphmert: architecture inherits Recipe B from default.yaml
# (6L/4H/256H/1024FFN, scalar LR 4e-4) — that combination was validated
# to fit RTX 3060 12 GB on the medical pipeline. Smoke just shrinks epochs.
graphmert:
  train_epochs: 2
  effective_batch_size: 8
  # NOTE: most graphmert TRAINING knobs still live in
  # 2_graphmert/launch_configs/args_mlm.yaml (a HuggingFace argparse YAML).
  # The block below is the partial integration: 2_graphmert/utils/architecture.py
  # reads graphmert.config.root_nodes/num_leaves from here at import time
  # so mlm_utils / dataset_preprocessing_utils / predict_tails stay in sync.
  config:
    # Graph-structure invariants — match upstream commit 2d7b782 (Jake's
    # defaults). Smoke can shrink these later if needed to fit RTX 3060;
    # for now bit-identical to upstream.
    root_nodes: 512
    num_leaves: 3
    # max_nodes is DERIVED in architecture.py as root_nodes * (1 + num_leaves) — do not set

curriculum:
  # 100-150 Q&A pairs: enough to exercise SFT training (need 50+ examples minimum).
  # At thinking_budget=1024, ~90 min total (acceptable smoke runtime).
  num_questions: 150
  hop_range: [1, 3]
  # Reduced from 4096 to 1024 for ~4x faster per-call latency. NOT zero —
  # Jha mandate (2026-06-04) requires reasoning at every stage; we're
  # trimming, not removing.
  thinking_budget: 1024
  # Checkpoint every 20 questions: at 150 total, ~7 checkpoints for safety.
  checkpoint_every: 20
  # Parallel Gemini workers for question generation. Default is 5 (fast).
  # Smoke uses 3 for balance: parallelization without hammering Gemini API.
  # 3-4h (sequential) → ~1.5-2h (3 workers). Respects rate limits (429 backoff).
  parallel_generation_workers: 3

# sft: keys match 3_si_curriculum/training/trainer.py::TrainingConfig fields
# that are wired via get_phase_param (lora_r, lora_alpha, lora_dropout,
# block_size). Anything else (epochs, batch_size) goes via CLI flags to the
# HF Trainer — not in this YAML.
sft:
  block_size: 4096          # default 32768 OOMs on 12 GB; 4k is enough for smoke

# rl: keys match 3_si_curriculum/RL/rl_training.py::TrainingConfig.
# DO NOT use n_completions / max_completion_tokens — those names existed in
# an earlier draft and are silently ignored. The wired names are
# num_generations and max_completion_length.
rl:
  num_generations: 2
  max_completion_length: 256
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  eval_steps: 25
  save_steps: 50
  # Single-GPU smoke: paper-grade default.yaml has use_deepspeed=true +
  # use_lora=false (multi-GPU + ZeRO-3, full fine-tune). Smoke flips
  # both — ZeRO-3 needs multi-GPU; without LoRA, GRPOTrainer doubles
  # memory by keeping a separate ref_model. Memory entry
  # [Stage 3 RL 12GB gotchas] documents LoRA-on-RL as the fork-patch
  # required to fit GRPO on a single 12-24 GB GPU.
  use_deepspeed: false
  use_lora: true

# RunPod hardware defaults for this scale (read by scripts/runpod/launch.sh).
# 32-48 GB band (L40S/L40/A6000/A40). 48 GB is enough to load Qwen3-14B (~28 GB)
# or Mistral-Nemo (~24 GB) one-at-a-time, so the consensus steps run real
# distinct-model agreement and smoke mirrors pilot/paper validation behavior.
runpod:
  # Primary GPU selection: dynamic discovery. Band 32-48 GB; launch tries the
  # highest-VRAM match first (high->low). 48 GB-class (L40S/L40/A6000/A40) preferred.
  vram_gb_min: 32
  vram_gb_max: 48
  # Static fallback (ordered high->low VRAM): only if discovery returns empty / API hiccup.
  gpu_types:
    - "NVIDIA L40S"
    - "NVIDIA L40"
    - "NVIDIA RTX A6000"
    - "NVIDIA A40"
  cloud_type: COMMUNITY
  disk_gb: 100
  num_gpus: 1
  expected_runtime_min: 90
  approx_cost_usd: 1.0
  notes: "All 6 phases end-to-end validation: extract → graphmert → curriculum → sft → rl. Qwen 8B ensures fidelity closer to paper-grade Qwen3-14B."
