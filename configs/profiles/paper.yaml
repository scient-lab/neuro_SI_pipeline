# configs/profiles/paper.yaml - paper-faithful full-scale run.
# Target: replicate the Stephen & Jha 2026 neuroscience paper results.
# Only lists keys that override configs/default.yaml — everything else
# inherits from the defaults.

graphmert:
  # 2_graphmert/utils/architecture.py reads graphmert.config.root_nodes
  # and graphmert.config.num_leaves at import time so mlm_utils /
  # dataset_preprocessing_utils / predict_tails stay in sync.
  config:
    # Graph-structure invariants — match upstream commit 2d7b782 (Jake's
    # defaults). Paper-faithful = full scale (root=512, num_leaves=3, max=2048).
    root_nodes: 512
    num_leaves: 3
    # max_nodes is DERIVED in architecture.py as root_nodes * (1 + num_leaves) — do not set

curriculum:
  num_questions: 30000

# extract.input_dir is intentionally NOT set — extract.sh defaults to
# corpus/${SI_DOMAIN}/ when unset. Paper-faithful replication: drop Kandel's
# Principles of Neural Science .txt files under corpus/<domain>/.

# RunPod hardware defaults for this scale (read by scripts/runpod/launch.sh).
# Single-H100 setup; for multi-GPU use --gpu-type / --num-gpus on the CLI
# (a future paper-multi.yaml may codify the 8x A100 variant from the paper).
runpod:
  # Primary: dynamic discovery — 80 GB-class hardware (H100s + A100 80GBs).
  vram_gb_min: 80
  vram_gb_max: 96      # also allows H100 NVL (94 GB) if cheaper than H100 SXM
  # Static fallback if discovery fails / returns empty.
  gpu_types:
    - "NVIDIA H100 80GB HBM3"
    - "NVIDIA H100 PCIe"
    - "NVIDIA A100 80GB PCIe"
    - "NVIDIA A100-SXM4-80GB"
  cloud_type: SECURE
  disk_gb: 300
  num_gpus: 1
  expected_runtime_min: 600
  approx_cost_usd: 30
  notes: "Paper-scale corpus on a single H100. ~10h walltime."
