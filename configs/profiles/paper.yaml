# configs/profiles/paper.yaml - publication-grade full-scale run.
# Target: 10000+ input examples → 5000+ curriculum Q&A pairs → 2500+ SFT examples.
# Multi-GPU orchestration via SLURM or single H100 for cloud demo.
# Uses ZeRO-3 + full fine-tune (no LoRA, no SDPA, paper-grade quality).

extract:
  # ADVISORY only (see default.yaml::extract.expected_input_docs) — NOT a cap.
  # extract.sh warns if CORPUS_PATH exceeds this; extract processes the whole
  # corpus regardless (no input limit in code).
  expected_input_docs: 10000

graphmert:
  train_epochs: 50
  effective_batch_size: 256
  # 2_graphmert/utils/architecture.py reads graphmert.config.root_nodes
  # and graphmert.config.num_leaves at import time so mlm_utils /
  # dataset_preprocessing_utils / predict_tails stay in sync.
  config:
    # Graph-structure invariants — match upstream commit 2d7b782 (Jake's
    # defaults). Paper-faithful = full scale (root=512, num_leaves=3, max=2048).
    root_nodes: 512
    num_leaves: 3
    # max_nodes is DERIVED in architecture.py as root_nodes * (1 + num_leaves) — do not set

curriculum:
  num_questions: 5000
  hop_range: [1, 5]
  # Cap validate_qa context (else default.yaml's null → Mistral-Nemo's 131072
  # nominal context overflows the KV cache — the crash smoke/pilot fixed).
  # DERIVED, not a round number: the validation prompt = the Q&A item's
  # explanation/thinking_trace (bounded by curriculum.thinking_budget = 4096) +
  # question/answer/path + the ~400-tok system prompt ≈ 4.7k, plus the
  # validator's own generation (validate_qa_max_tokens = 1024) ≈ 5.7k. 8192
  # covers that with headroom. Equals pilot's cap because both share
  # thinking_budget=4096 (smoke's is 1024 → its 4096 cap suffices). The cap
  # tracks thinking_budget; bump both together if you raise it.
  validate_qa_max_model_len: 8192

# sft: no overrides — paper inherits default.yaml wholesale (block_size 32768,
# attn_implementation flash_attention_2 via the pre-built wheel). NOTE: do NOT
# write `sft:\n  pass` here — YAML parses the bare `pass` as the string "pass",
# making cfg['sft'] a str, which crashes get_phase_param('sft', ...). Omitting
# the block entirely lets it fall through to default cleanly.

rl:
  # Multi-GPU: use ZeRO-3 for sharding, full fine-tune (no LoRA).
  use_deepspeed: true
  use_lora: false
  num_generations: 16
  max_completion_length: 1280
  num_train_epochs: 10

# No extract.input_dir — CORPUS_PATH is REQUIRED (extract.sh fails fast if
# unset). Paper-faithful replication: drop Kandel's Principles of Neural Science
# .txt files under corpus/neuroscience/source_txt and set
#   CORPUS_PATH=corpus/neuroscience/source_txt

# RunPod hardware defaults for this scale (read by scripts/runpod/launch.sh).
# Primary use: Princeton Della HPC via SLURM (multi-GPU, ZeRO-3).
# Fallback: single H100 on RunPod for demo/validation.
# For multi-GPU SLURM: scripts/runpod/launch.sh --gpu-type ... --num-gpus 8
runpod:
  # Single-GPU: 96-288 GB ultra-tier (H200 141GB / B200 192GB). Launch tries
  # the highest-VRAM match first (high->low). NOTE: the 96 GB floor EXCLUDES
  # H100/A100-80GB — those now belong to the pilot profile (80-96 GB).
  # For paper-grade multi-GPU, use SLURM on Della or add paper-multi.yaml.
  vram_gb_min: 96
  vram_gb_max: 288      # accept up to 288 GB (single-GPU max today is B200 192GB)
  # Static fallback if discovery fails / returns empty. Ordered high->low VRAM.
  gpu_types:
    - "NVIDIA B200"
    - "NVIDIA H200"
  cloud_type: SECURE
  disk_gb: 500
  num_gpus: 1
  expected_runtime_min: 1440    # ~1 day single-GPU; 2-3h with 8× A100 multi-GPU on Della
  approx_cost_usd: 100.0        # estimate: 1 day × H100 @ $2/hr
  notes: "Publication-scale (10k docs, 5k Q&A, ZeRO-3 full FT). Recommended: 8× A100 on Princeton Della HPC (2-3h). Single H100 demo: ~24h, $50-100."
