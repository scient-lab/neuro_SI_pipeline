# configs/profiles/pilot.yaml - single-book / 1k-record pilot.
# Target: one textbook chapter or ~1k records on an A6000 (48 GB) tier.
# Keys verified against the consuming code (same caveats as smoke.yaml).

extract:
  max_input_examples: 1000

graphmert:
  train_epochs: 10
  effective_batch_size: 32
  # NOTE: graphmert TRAINING reads from 2_graphmert/launch_configs/args_mlm.yaml;
  # this YAML override is documentation-only until that wire is done.

curriculum:
  num_questions: 5000
  hop_range: [1, 4]

# sft: matches trainer.py::TrainingConfig wired fields (lora_r/alpha/dropout
# inherit from default.yaml). block_size larger than smoke since A6000 has 48 GB.
sft:
  block_size: 8192

# rl: keys match rl_training.py::TrainingConfig (NOT n_completions /
# max_completion_tokens — those names are ignored).
rl:
  num_generations: 4
  max_completion_length: 512
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 3

# RunPod hardware defaults for this scale (read by scripts/launch_runpod.sh).
runpod:
  gpu_type: "NVIDIA RTX A6000"
  cloud_type: SECURE
  disk_gb: 150
  num_gpus: 1
  expected_runtime_min: 240
  approx_cost_usd: 4
  notes: "Workstation-equivalent on a faster cloud GPU."
