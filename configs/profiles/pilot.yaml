# configs/profiles/pilot.yaml - performance baseline & feasibility validation.
# Target: 2000-3000 input examples → 1000+ curriculum Q&A pairs → 500+ SFT examples.
# Validates end-to-end at reasonable scale with paper-grade Qwen3-14B.
# Runs on the 80-96 GB tier (H100 NVL / H100-80 / A100-80).

extract:
  max_input_examples: 2500
  # input_dir is intentionally NOT set here — extract.sh defaults to
  # corpus/${SI_DOMAIN}/ when unset, so pilot picks up whatever .txt files
  # the operator drops under corpus/<domain>/ (e.g. corpus/neuroscience/).
  # Smoke explicitly overrides to corpus/<domain>/smoke/ for its fixture.

graphmert:
  train_epochs: 20
  # 64 (was 32): the 80-96 GB tier has the headroom; larger batch → faster,
  # smoother MNM convergence. Still well below paper's 256.
  effective_batch_size: 64
  # NOTE: most graphmert TRAINING knobs still live in
  # 2_graphmert/launch_configs/args_mlm.yaml. The block below is the
  # partial integration: 2_graphmert/utils/architecture.py reads
  # graphmert.config.root_nodes/num_leaves from here at import time
  # so mlm_utils / dataset_preprocessing_utils / predict_tails stay in sync.
  config:
    # Graph-structure invariants — match upstream commit 2d7b782 (Jake's
    # defaults). Pilot uses full scale (root=512, num_leaves=3, max=2048).
    root_nodes: 512
    num_leaves: 3
    # max_nodes is DERIVED in architecture.py as root_nodes * (1 + num_leaves) — do not set

curriculum:
  num_questions: 1000
  hop_range: [1, 4]
  # vLLM cap for validate_qa. On the 80-96 GB tier (H100/A100-80) there's ample
  # KV headroom, so 8192 (vs the old 48 GB-era 4096). Still far under the model
  # nominal 40960 that OOMs at 0.70 mem_util; prompts are ~1.3k tokens + 256 cap,
  # so 8192 is generous margin.
  validate_qa_max_model_len: 8192

# sft: matches trainer.py::TrainingConfig wired fields (lora_r/alpha/dropout
# inherit from default.yaml). block_size larger than smoke since A6000 has 48 GB.
sft:
  block_size: 8192
  # Force SDPA — flash-attn pin in 3_si_curriculum/requirements.txt is
  # commented out (chained build-dep failures: torch → setuptools → ...).
  # SDPA is PyTorch built-in, no extra package, ~10-15% slower than FA2
  # at our block_size=8192. Acceptable cost for pilot validation;
  # paper-grade work should install flash-attn via the pre-built wheel
  # documented in 3_si_curriculum/requirements.txt and remove this
  # override.
  attn_implementation: sdpa

# rl: keys match rl_training.py::TrainingConfig (NOT n_completions /
# max_completion_tokens — those names are ignored).
rl:
  num_generations: 4
  max_completion_length: 512
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  # Disable deepspeed — pilot runs on a single A6000. ZeRO-3 needs
  # multi-GPU; on single-GPU it triggers an mpi4py ImportError via
  # deepspeed.comm.mpi_discovery. See default.yaml::rl.use_deepspeed.
  use_deepspeed: false
  # Keep LoRA-on-RL even on the 80-96 GB tier. Full-FT 14B GRPO is NOT a
  # single-GPU job at ANY of these sizes: fp32 Adam states alone (~112 GB for
  # 14B) plus policy + reference + vLLM rollout blow past 96 GB. LoRA shares one
  # ~28 GB base instead of holding policy+reference separately. Full-FT (no LoRA)
  # is the paper MULTI-GPU ZeRO-3 path only. See default.yaml::rl.use_lora.
  use_lora: true

# RunPod hardware defaults for this scale (read by scripts/runpod/launch.sh).
#
# 80-96 GB tier: H100 (NVL / PCIe / 80GB HBM3) and A100-80. Hopper (H100) is
# strongly preferred over Ampere (A100): Qwen3-14B has no native vllm-0.7.3 impl
# and falls back to the HF Transformers backend (no PagedAttention), where raw
# compute dominates over VRAM size — H100 is ~2-3× faster than A100 for the same
# job, finishing sooner and costing less overall despite the higher hourly rate.
runpod:
  # Primary: dynamic discovery — 80-96 GB single-GPU (A100-80/H100/H100-NVL).
  # Launch tries the highest-VRAM match first (high->low), price asc as tiebreak.
  vram_gb_min: 80
  vram_gb_max: 96
  # Static fallback if discovery fails / returns empty. Ordered high->low VRAM.
  gpu_types:
    - "NVIDIA H100 NVL"
    - "NVIDIA H100 80GB HBM3"
    - "NVIDIA H100 PCIe"
    - "NVIDIA A100 80GB PCIe"
    - "NVIDIA A100-SXM4-80GB"
  cloud_type: SECURE
  disk_gb: 200
  num_gpus: 1
  expected_runtime_min: 360          # 6h: empirically ~90s/100q × 10 epochs graphmert + curriculum + sft + rl
  approx_cost_usd: 5.0
  notes: "Hopper (H100) preferred over Ampere (A100-80) — faster on the vllm-0.7.3 Transformers fallback. Performance baseline: 2500 input docs → 1000+ Q&A pairs."
