# configs/profiles/pilot.yaml - performance baseline & feasibility validation.
# Target: 2000-3000 input examples → 1000+ curriculum Q&A pairs → 500+ SFT examples.
# Validates end-to-end at reasonable scale with paper-grade Qwen3-14B.
# Runs on the 80-96 GB tier (H100 NVL / H100-80 / A100-80).

extract:
  # ADVISORY only (see default.yaml::extract.expected_input_docs) — NOT a cap.
  # extract.sh warns loudly if CORPUS_PATH holds more than this many .txt docs,
  # since extract processes the WHOLE corpus (no input limit in code) — so an
  # oversized FIFA/neuroscience corpus won't silently blow up the paid pilot.
  expected_input_docs: 2500
  # No input_dir — CORPUS_PATH is REQUIRED and is the single source of the
  # corpus location (extract.sh fails fast if unset). e.g. pilot:
  #   CORPUS_PATH=corpus/${SI_DOMAIN}/source_txt

graphmert:
  train_epochs: 20
  # 64 (was 32): the 80-96 GB tier has the headroom; larger batch → faster,
  # smoother MNM convergence. Still well below paper's 256.
  effective_batch_size: 64
  # fact_score_max_tokens NOT overridden — default.yaml is now 1024 (the Qwen3
  # inline-<think> budget), which already covers pilot's 14B validate_a.
  # NOTE: most graphmert TRAINING knobs still live in
  # 2_graphmert/launch_configs/args_mlm.yaml. The block below is the
  # partial integration: 2_graphmert/utils/architecture.py reads
  # graphmert.config.root_nodes/num_leaves from here at import time
  # so mlm_utils / dataset_preprocessing_utils / predict_tails stay in sync.
  config:
    # Graph-structure invariants — match upstream commit 2d7b782 (Jake's
    # defaults). Pilot uses full scale (root=512, num_leaves=3, max=2048).
    root_nodes: 512
    num_leaves: 3
    # max_nodes is DERIVED in architecture.py as root_nodes * (1 + num_leaves) — do not set

curriculum:
  num_questions: 1000
  hop_range: [1, 4]
  # vLLM cap for validate_qa, DERIVED from the prompt: the Q&A item's
  # explanation/thinking_trace (≤ curriculum.thinking_budget = 4096) +
  # question/answer/path + ~400-tok system prompt ≈ 4.7k, plus the validator's
  # generation (validate_qa_max_tokens = 1024) ≈ 5.7k → 8192 covers it. Far
  # under Mistral-Nemo's 131072 nominal (which overflows KV cache at 0.70
  # mem_util). The cap tracks thinking_budget — same as paper (both 4096).
  validate_qa_max_model_len: 8192

# sft: matches trainer.py::TrainingConfig wired fields (lora_r/alpha/dropout
# inherit from default.yaml). block_size larger than smoke since H100 has 80 GB+.
sft:
  block_size: 8192
  # attn_implementation inherits default.yaml's flash_attention_2 — the FA2
  # pre-built wheel is now installed via 3_si_curriculum/requirements.txt, so
  # the old sdpa override is removed (its own note said to drop it once the
  # wheel was wired). H100/A100-80 are sm_80/sm_90 → FA2 supported.

# rl: keys match rl_training.py::TrainingConfig (NOT n_completions /
# max_completion_tokens — those names are ignored).
rl:
  num_generations: 4
  # 1280 (was 512): matches main/paper — the authors' tuned value, sitting just
  # under the length-penalty hard_cap (1500). 512 was BROKEN: it's below even
  # length_penalty_soft_start (550), so Qwen3-14B (which reasons longer than 8B)
  # clipped before <answer> on every rollout → correctness/format = -1/0 flat →
  # reward_std=0 → zero GRPO gradient → no learning (same bug found in smoke at
  # 256, 2026-06-26 — worse here at 14B, and this is the PAID run). Drop toward
  # 1024 only if the pilot GPU OOMs at 1280; do NOT go back below ~768.
  max_completion_length: 1280
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  # Disable deepspeed — pilot runs on a single A6000. ZeRO-3 needs
  # multi-GPU; on single-GPU it triggers an mpi4py ImportError via
  # deepspeed.comm.mpi_discovery. See default.yaml::rl.use_deepspeed.
  use_deepspeed: false
  # Keep LoRA-on-RL even on the 80-96 GB tier. Full-FT 14B GRPO is NOT a
  # single-GPU job at ANY of these sizes: fp32 Adam states alone (~112 GB for
  # 14B) plus policy + reference + vLLM rollout blow past 96 GB. LoRA shares one
  # ~28 GB base instead of holding policy+reference separately. Full-FT (no LoRA)
  # is the paper MULTI-GPU ZeRO-3 path only. See default.yaml::rl.use_lora.
  use_lora: true
  # MUST be false on LoRA runs (see default.yaml::rl.gradient_checkpointing):
  # PEFT breaks TRL's per-rollout grad-ckpt-disable → garbage rollouts. MEMORY
  # CAVEAT: 14B without checkpointing raises activation memory; if it OOMs on the
  # 80-96 GB tier, do NOT just re-enable it (that brings the garbage back) —
  # instead trim num_generations / max_completion_length, or fix TRL's PEFT
  # grad-ckpt-disable so checkpointing can stay on safely.
  gradient_checkpointing: false

# RunPod hardware defaults for this scale (read by scripts/runpod/launch.sh).
#
# 80-96 GB tier: H100 (NVL / PCIe / 80GB HBM3) and A100-80. Hopper (H100) is
# strongly preferred over Ampere (A100): Qwen3-14B has no native vllm-0.7.3 impl
# and falls back to the HF Transformers backend (no PagedAttention), where raw
# compute dominates over VRAM size — H100 is ~2-3× faster than A100 for the same
# job, finishing sooner and costing less overall despite the higher hourly rate.
runpod:
  # Primary: dynamic discovery — 80-96 GB single-GPU (A100-80/H100/H100-NVL).
  # Launch tries the highest-VRAM match first (high->low), price asc as tiebreak.
  vram_gb_min: 80
  vram_gb_max: 96
  # Static fallback if discovery fails / returns empty. Ordered high->low VRAM.
  gpu_types:
    - "NVIDIA H100 NVL"
    - "NVIDIA H100 80GB HBM3"
    - "NVIDIA H100 PCIe"
    - "NVIDIA A100 80GB PCIe"
    - "NVIDIA A100-SXM4-80GB"
  cloud_type: SECURE
  # 3 venvs (~20 GB) + HF cache (Qwen3-14B ~28 GB + Mistral-Nemo ~24-46 GB) +
  # graphmert checkpoints + 1000-Q&A curriculum + multi-epoch SFT/RL checkpoints.
  disk_gb: 250
  num_gpus: 1
  expected_runtime_min: 360          # 6h: empirically ~90s/100q × 10 epochs graphmert + curriculum + sft + rl
  approx_cost_usd: 5.0
  notes: "Hopper (H100) preferred over Ampere (A100-80) — faster on the vllm-0.7.3 Transformers fallback. Performance baseline: 2500 input docs → 1000+ Q&A pairs."
