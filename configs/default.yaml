# configs/default.yaml - universal operational defaults.
#
# Applied FIRST in the merge chain. Overridden by:
#   - domains/<domain>.yaml (vocabulary + optional overrides)
#   - configs/profiles/<profile>.yaml (scale)
#   - configs/platforms/<platform>.yaml (hardware/storage)
#   - environment variables
#
# Edit this file when defaults apply across ALL domains. Domain-specific
# overrides go in domains/<domain>.yaml under the `overrides:` key.

# --- Models ---------------------------------------------------------------
# Default LLM stack per the Stephen & Jha 2026 neuroscience paper.
# Keys match the variable names used by the consuming Python code so that
# `pipeline_config.get_model_id(<key>)` reads cleanly at call sites.
models:
  # Phase 1: extract (single-LLM extraction)
  extract: Qwen/Qwen3-14B

  # Phase 2: validate (two-LLM consensus filter on candidate triples).
  # validate_a was openai/gpt-oss-20b (MXFP4 quantization) — incompatible
  # with the vllm==0.7.3 pin used across this fork. Swapped to Qwen3-14B
  # which is already cached on the pod from extract + predict_tails. When
  # vLLM is upgraded to 0.10+ (mxfp4 supported), revert this back to
  # openai/gpt-oss-20b. Diversity vs validate_b (Mistral) is preserved.
  validate_a: Qwen/Qwen3-14B
  validate_b: mistralai/Mistral-Nemo-Instruct-2407

  # Phase 3: graphmert.predict_tails (2_graphmert/predict_tails_llm.py).
  # Loaded via vLLM as a generative LM; the docstring example uses
  # qwen3-32b but we default to 14B to match `extract` (same model loaded
  # once per pod = no extra download). NOTE: this is NOT the trained
  # GraphMERT checkpoint — the LLM-based path generates candidate tails
  # via prompting, not via the trained encoder/MLM head. Replacing this
  # with the GraphMERT-based variant (2_graphmert/utils/predict_tails.py)
  # would require a different wiring in scripts/phases/graphmert.sh.
  predict_tails: Qwen/Qwen3-14B

  # Phase 4: curriculum (4 internal models in generate_questions.py + final
  # two-LLM consensus check per Jha 2026-06-04 mandate)
  curriculum_generation: gemini-2.5-flash   # MODEL_GENERATION
  curriculum_quality: gemini-2.5-flash      # MODEL_QUALITY
  curriculum_trace: gemini-2.5-flash        # MODEL_TRACE
  curriculum_correctness: gemini-2.5-flash  # MODEL_CORRECTNESS
  # curriculum_check_a was openai/gpt-oss-20b — same MXFP4-vs-vLLM-0.7.3
  # incompatibility as validate_a above. Swapped for the same reason;
  # revert together when vLLM gets upgraded.
  curriculum_check_a: Qwen/Qwen3-14B        # final two-LLM check (was openai/gpt-oss-20b)
  curriculum_check_b: mistralai/Mistral-Nemo-Instruct-2407

  # Phase 5: SFT (LoRA base model)
  base_sft: Qwen/Qwen3-14B

# --- Phase: extract -------------------------------------------------------
extract:
  chunk_tokens: 300
  chunk_overlap: 50
  max_candidates_per_chunk: 20
  strip_equations: true
  strip_references: true
  # Sampling for the extraction LLM (1_seed_kg/graphrag_index.py)
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  min_p: 0
  # Matches upstream hardcoded value (1_seed_kg/graphrag_index.py at
  # commit 33823cb, line 134). DO NOT change without Jake's review —
  # any divergence from upstream needs to be defensible.
  max_tokens: 8192
  # Suppress Qwen3's <think>...</think> block in the response. true =
  # append "/no_think" control token to the user prompt (Qwen3 honors it).
  # Naming: <step_or_substep>_no_think — one knob per LLM-using script.
  # NOTE: defaults to false here because A/B testing on the Purves corpus
  # showed thinking is empirically necessary to disambiguate metadata from
  # real content (with /no_think the model dumped every noun as an entity
  # and produced 0 relationships). Flip per-profile if you have a dense
  # cleaned corpus where thinking is genuinely wasted.
  extract_triples_no_think: false
  # Matches upstream hardcoded value (1_seed_kg/graphrag_index.py at
  # commit 33823cb, line 146). Earlier YAML default of 4096 was a
  # regression I introduced in 9b773ec — caused silent truncation of
  # relationships. Restored to upstream. DO NOT change without Jake's
  # review.
  max_model_len: 20000
  # Ontological vocabulary (paper-grade: closed-vocabulary extraction per §4.1).
  # Prof Jha guidance (2026-06-15): entity categories and relations should be
  # frequency-derived from the extracted corpus AFTER analyzing actual outputs,
  # not hand-picked before extraction. These knobs prepare for that transition.
  #
  # Paper-grade: use all categories/relations from domains/<domain>.yaml
  # Later (post-audit): can set to frequency-derived counts after running
  # 1_seed_kg/analyze_relations.py on seed KG extraction output.
  num_entity_categories: 8          # Use top N categories from domains/
  num_relation_types: 40            # Use top N relations from domains/
  # Single-GPU by default. Paper multi-GPU pilots set this in their profile.
  tensor_parallel_size: 1
  # Fraction of GPU memory vLLM is allowed to occupy. 0.90 default; bump up
  # if you've got dedicated VRAM, drop if other processes share the GPU.
  gpu_memory_utilization: 0.90
  # CLI-overridable in graphrag_index.py via --batch_size / --rows_per_job.
  batch_size: 100         # concurrent prompts per LLM call
  rows_per_job: 8000      # rows per SLURM array job (SLURM only)

# --- Phase: validate -----------------------------------------------------
validate:
  consensus_threshold: 0.6   # both must agree above this confidence
  retry_on_disagreement: false

# --- Phase: graphmert ----------------------------------------------------
graphmert:
  # Architecture (run_mlm.py)
  layers: 6
  heads: 4
  hidden: 256
  ffn: 1024
  train_epochs: 25
  effective_batch_size: 64
  learning_rate: 4.0e-4
  # Tail prediction (2_graphmert/predict_tails_llm.py)
  predict_temperature: 0.4
  predict_top_p: 0.95
  predict_max_new_tokens: 512
  predict_tails_max: 50
  predict_prompt_text_max_chars: 12000
  predict_tensor_parallel_size: 1
  predict_max_model_len: 8192
  predict_gpu_memory_utilization: 0.90
  # Combine-tails LLM init (2_graphmert/utils/combine_tails/combine_tails.py)
  # — separate keys so combine_tails can run on a different GPU profile than
  # predict_tails if needed.
  combine_tails_max_model_len: 4096
  combine_tails_tensor_parallel_size: 1
  # ----- Per-step Qwen3 <think>...</think> control -----
  # Defaults all FALSE (thinking ON) for the same reason as
  # extract.extract_triples_no_think — empirical regression on Purves
  # showed quality collapse without thinking. Pair with extract.max_tokens
  # >= 32768 to keep responses from truncating mid-output. One knob per
  # LLM-using script (6 total across extract + graphmert).
  #
  # Pattern-match: text → entities (substep of preprocess).
  entity_discovery_no_think: false
  # Pattern-match: text + heads → relation triples (substep of preprocess).
  add_llm_relations_no_think: false
  # Constrained generation: head + relation → list of plausible tails.
  predict_tails_no_think: false
  # Dedup/normalize tail prediction shards (substep of validate_predictions).
  combine_tails_no_think: false
  # Judgment: (head, relation, tail) → "is this triple factually consistent?"
  # Keep thinking ON (false) — /no_think empirically tanks accuracy (same finding
  # as extract_triples_no_think on the Purves corpus; reasoning is load-bearing).
  # KNOWN ISSUE: fact_score.py hardcodes max_tokens=10, which truncates Qwen3's
  # <think> block before the verdict → startswith("yes") fails → 100% of triples
  # dropped (smoke 2026-06-25). The real fix is IN fact_score.py — give it a
  # think-sized token budget (like the 20000 the other stages use) and parse the
  # verdict AFTER </think>, NOT disabling thinking here. Until that lands, the
  # two-LLM seed-KG validate step on Qwen3 will drop everything.
  fact_score_no_think: false
  # Generation cap for the fact_score judge (fact_score.py SamplingParams).
  # Replaces the upstream hardcoded max_tokens=10, which truncated Qwen3's
  # <think> block before the verdict → 100% drop. Must fit reasoning + the final
  # yes/no. 512 suits a terse reasoned judgment; raise (1024+) if you still see
  # an unexpectedly high drop rate (a sign think blocks are being cut off),
  # lower for speed. Profiles may override per scale.
  fact_score_max_tokens: 512
  combine_tails_gpu_memory_utilization: 0.90

# --- Phase: curriculum ---------------------------------------------------
curriculum:
  hop_range: [1, 5]
  num_questions: 30000   # paper-default; profiles can override
  prune_fanout: 8
  qa_check_required: true   # Jha 2026-06-04 mandate
  # Gemini 2.5-flash thinking budget for the question-generation LLM call
  # (generate_questions.py::LLM.generate_question). 4096 matches the
  # original hardcoded value and preserves paper-scale reasoning depth.
  # Smoke profile drops this to 512 (~8x faster per call). Smoke-validated
  # 2026-06-23: 100q at 4096 ran 3h on RTX 3060. Tune cautiously — Jha
  # 2026-06-04 mandate: "mandatory reasoning LLMs at every stage."
  thinking_budget: 4096
  # Persist the in-progress curriculum.json every N successful questions
  # (generate_curriculum.py main loop). 100 matches the original hardcoded
  # value; smoke profile drops to 5 so a crash at q=99 doesn't lose work.
  checkpoint_every: 100
  # Parallel Gemini question generation (generate_curriculum.py).
  # Default: 5 (parallel workers to speed up 100q from 3-4h to ~1h).
  # More workers = faster, respects Gemini rate limits (429 errors backoff).
  # Paper/conservative: override to 1 if hitting API quotas. Smoke: override to 3.
  parallel_generation_workers: 5
  # vLLM init for verify_questions.py (validate_qa step). Values mirror the
  # upstream CLI defaults — paper/HPC-scale. Smaller GPUs cap things via
  # profile YAML (see configs/profiles/pilot.yaml::curriculum overrides).
  #
  # max_model_len: null → DO NOT pass to vLLM, let it use the model's
  # nominal config.max_position_embeddings (40960 for Qwen3-14B, ~1M for
  # Mistral-Nemo-12B). Matches the upstream behaviour: original code never
  # passed this kwarg. On a 48 GB GPU at 0.70 mem_util this OOMs the KV
  # cache; pilot/smoke profiles override to a concrete cap (e.g. 4096).
  validate_qa_max_model_len: null
  validate_qa_gpu_memory_utilization: 0.70
  validate_qa_tensor_parallel_size: 1
  validate_qa_batch_size: 64
  # Generation cap for the two-LLM QA check (verify_questions.py). MUST fit a
  # Qwen3 <think> block + the final [yes]/[no] — the upstream hardcoded 256
  # truncated thinking mid-reason → no verdict → 97% false-reject (smoke
  # 2026-06-25, 151 Q&A → 4 kept). Bounded above by validate_qa_max_model_len.
  # Raise if the drop rate looks implausibly high; lower for speed.
  validate_qa_max_tokens: 1024

# --- Phase: sft (matches 3_si_curriculum/training/trainer.py) ------------
sft:
  lora_r: 32                  # was lora_rank: 16 — code uses 32
  lora_alpha: 64              # was 32 — code uses 64
  lora_dropout: 0.05
  block_size: 32768
  # DataLoader workers per rank. RunPod single-node 2 is fine; SLURM with
  # --cpus-per-task=4 should drop to 1 to avoid oversubscription.
  dataloader_num_workers: 2
  dataloader_prefetch_factor: 2
  # HF attn_implementation passed to AutoModelForCausalLM.from_pretrained.
  # Upstream default in trainer.py:281 was hardcoded "flash_attention_2" (
  # paper used FA2 on Princeton's Della HPC where flash-attn is built into
  # the conda env). We surface it as a knob so envs without flash_attn
  # (e.g., our si_curriculum venv on RunPod) can drop to SDPA without a
  # code edit. Acceptable values:
  #   "flash_attention_2"  paper-grade, requires `flash_attn` package
  #   "sdpa"               PyTorch built-in, no extra package, ~10-15% slower
  #   "eager"              naive attention, slowest, only for debugging
  attn_implementation: flash_attention_2

# --- Phase: rl (matches 3_si_curriculum/RL/rl_training.py) --------------
rl:
  algorithm: grpo
  learning_rate: 8.0e-7              # was 2.0e-6 — code uses 8e-7
  beta: 0.12                          # was 0.04 — code uses 0.12 (KL penalty)
  num_generations: 4                  # was n_completions
  max_completion_length: 1280         # was max_completion_tokens: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 10                # was train_epochs: 3 (in sft section)
  max_grad_norm: 1.0
  eval_size: 100
  eval_steps: 50
  save_steps: 100
  generation_dump_every: 25
  reward_source: kg_path_alignment
  # GRPO rollout sampling — used by GRPOConfig in rl_training.py
  generation_temperature: 0.6
  generation_top_p: 0.9
  generation_repetition_penalty: 1.15
  # Smooth length-penalty curve. Soft start = no penalty; hard cap = full
  # penalty. Tunable per domain (long-thinking vs short-answer).
  length_penalty_soft_start: 550
  length_penalty_hard_cap: 1500
  # Path-alignment reward gates on the first N tokens of <think>.
  path_alignment_thinking_tokens: 550
  # Pass --deepspeed <config> to rl_training.py when True. The config at
  # 3_si_curriculum/RL/deepspeed_config.json is ZeRO-3 + multi-GPU. On
  # single-GPU smoke/pilot, ZeRO-3's init_distributed falls through to
  # mpi4py which isn't in our venv (would also need OpenMPI in bootstrap).
  # Default True matches the paper-grade multi-GPU SLURM setup; profiles
  # for single-GPU hardware (pilot.yaml, smoke.yaml) override to False.
  use_deepspeed: true
  # Paper-grade default: full fine-tune (no LoRA on RL). The Princeton
  # SLURM setup ran full GRPO with ZeRO-3 sharding the model across
  # multiple GPUs, which works because ZeRO-3 partitions the policy +
  # reference across the cluster — no single GPU holds a full copy.
  #
  # Single-GPU profiles (pilot.yaml, smoke.yaml) override to true to
  # use the FORK-PATCHED LoRA path: peft_config wraps the policy
  # adapter and lets the reference share the base model (no second
  # full-model copy). Memory entry [Stage 3 RL 12GB gotchas]
  # documents this as the critical patch for fitting GRPO on a single
  # 12GB/24GB/48GB GPU. Without LoRA OR ZeRO-3, GRPOTrainer
  # instantiates a separate ref_model and OOMs on Qwen3-14B + single
  # A6000 (~56GB needed, 47.5GB available).
  #
  # LoRA params (when enabled) reuse sft.lora_r / sft.lora_alpha /
  # sft.lora_dropout — typical RL LoRA ranks match SFT.
  use_lora: false

# --- Quality expectations ------------------------------------------------
# Read by scripts/lib/step_quality.py to judge per-step OUTPUT (not exit code):
# pass / warn / fail / skip / unknown. Same verdict drives the future quality
# gate. SCALE-INVARIANT band/ratio params ONLY — the scale anchors (target
# counts, corpus sizes) are read from each step's OWN signal (input row count,
# input-doc count, curriculum.num_questions), NEVER duplicated here, so smoke
# and paper judge correctly with one rule. Profiles override a key below only
# when a band genuinely differs at that scale (rare).
expectations:
  extract:
    extract_triples:
      # triples ÷ input-doc count (a ratio, profile-free)
      triples_per_doc_fail: 1.0     # < → fail (near-empty extraction)
      triples_per_doc_warn: 5.0     # < → warn (thin)
  validate:
    seed_kg_consensus:
      # drop = 1 - kept/input, anchored to the step's own input
      drop_fail_high: 0.95          # ≥ → fail (~all dropped: parser/model broken)
      drop_warn_high: 0.60          # > → warn (low yield)
      drop_warn_low:  0.01          # ≤ → warn (nothing filtered: consensus a no-op)
  graphmert:
    preprocess:
      min_grounding_success: 1      # 0 → fail (no trainable samples; the success==0 dead end)
  curriculum:
    generate_qa:
      # got vs the profile's OWN curriculum.num_questions (not duplicated here)
      frac_of_target_warn: 0.5      # < 50% of target → warn
