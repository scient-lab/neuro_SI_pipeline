# configs/default.yaml - universal operational defaults.
#
# Applied FIRST in the merge chain. Overridden by:
#   - domains/<domain>.yaml (vocabulary + optional overrides)
#   - configs/profiles/<profile>.yaml (scale)
#   - configs/platforms/<platform>.yaml (hardware/storage)
#   - environment variables
#
# Edit this file when defaults apply across ALL domains. Domain-specific
# overrides go in domains/<domain>.yaml under the `overrides:` key.

# --- Models ---------------------------------------------------------------
# Default LLM stack per the Stephen & Jha 2026 neuroscience paper.
# Keys match the variable names used by the consuming Python code so that
# `pipeline_config.get_model_id(<key>)` reads cleanly at call sites.
models:
  # Phase 1: extract (single-LLM extraction)
  extract: Qwen/Qwen3-14B

  # Phase 2: validate (two-LLM consensus filter on candidate triples).
  # validate_a was openai/gpt-oss-20b (MXFP4 quantization) — incompatible
  # with the vllm==0.7.3 pin used across this fork. Swapped to Qwen3-14B
  # which is already cached on the pod from extract + predict_tails. When
  # vLLM is upgraded to 0.10+ (mxfp4 supported), revert this back to
  # openai/gpt-oss-20b. Diversity vs validate_b (Mistral) is preserved.
  validate_a: Qwen/Qwen3-14B
  validate_b: mistralai/Mistral-Nemo-Instruct-2407

  # Phase 3: graphmert.predict_tails (2_graphmert/predict_tails_llm.py).
  # Loaded via vLLM as a generative LM; the docstring example uses
  # qwen3-32b but we default to 14B to match `extract` (same model loaded
  # once per pod = no extra download). NOTE: this is NOT the trained
  # GraphMERT checkpoint — the LLM-based path generates candidate tails
  # via prompting, not via the trained encoder/MLM head. Replacing this
  # with the GraphMERT-based variant (2_graphmert/utils/predict_tails.py)
  # would require a different wiring in scripts/phases/graphmert.sh.
  predict_tails: Qwen/Qwen3-14B

  # Phase 4: curriculum (4 internal models in generate_questions.py + final
  # two-LLM consensus check per Jha 2026-06-04 mandate)
  curriculum_generation: gemini-2.5-flash   # MODEL_GENERATION
  curriculum_quality: gemini-2.0-flash      # MODEL_QUALITY
  curriculum_trace: gemini-2.0-flash        # MODEL_TRACE
  curriculum_correctness: gemini-2.5-flash  # MODEL_CORRECTNESS
  # curriculum_check_a was openai/gpt-oss-20b — same MXFP4-vs-vLLM-0.7.3
  # incompatibility as validate_a above. Swapped for the same reason;
  # revert together when vLLM gets upgraded.
  curriculum_check_a: Qwen/Qwen3-14B        # final two-LLM check (was openai/gpt-oss-20b)
  curriculum_check_b: mistralai/Mistral-Nemo-Instruct-2407

  # Phase 5: SFT (LoRA base model)
  base_sft: Qwen/Qwen3-14B

# --- Phase: extract -------------------------------------------------------
extract:
  chunk_tokens: 300
  chunk_overlap: 50
  max_candidates_per_chunk: 20
  strip_equations: true
  strip_references: true
  # Sampling for the extraction LLM (1_seed_kg/graphrag_index.py)
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  min_p: 0
  # Matches upstream hardcoded value (1_seed_kg/graphrag_index.py at
  # commit 33823cb, line 134). DO NOT change without Jake's review —
  # any divergence from upstream needs to be defensible.
  max_tokens: 8192
  # Suppress Qwen3's <think>...</think> block in the response. true =
  # append "/no_think" control token to the user prompt (Qwen3 honors it).
  # Naming: <step_or_substep>_no_think — one knob per LLM-using script.
  # NOTE: defaults to false here because A/B testing on the Purves corpus
  # showed thinking is empirically necessary to disambiguate metadata from
  # real content (with /no_think the model dumped every noun as an entity
  # and produced 0 relationships). Flip per-profile if you have a dense
  # cleaned corpus where thinking is genuinely wasted.
  extract_triples_no_think: false
  # Matches upstream hardcoded value (1_seed_kg/graphrag_index.py at
  # commit 33823cb, line 146). Earlier YAML default of 4096 was a
  # regression I introduced in 9b773ec — caused silent truncation of
  # relationships. Restored to upstream. DO NOT change without Jake's
  # review.
  max_model_len: 20000
  # Single-GPU by default. Paper multi-GPU pilots set this in their profile.
  tensor_parallel_size: 1
  # Fraction of GPU memory vLLM is allowed to occupy. 0.90 default; bump up
  # if you've got dedicated VRAM, drop if other processes share the GPU.
  gpu_memory_utilization: 0.90
  # CLI-overridable in graphrag_index.py via --batch_size / --rows_per_job.
  batch_size: 100         # concurrent prompts per LLM call
  rows_per_job: 8000      # rows per SLURM array job (SLURM only)

# --- Phase: validate -----------------------------------------------------
validate:
  consensus_threshold: 0.6   # both must agree above this confidence
  retry_on_disagreement: false

# --- Phase: graphmert ----------------------------------------------------
graphmert:
  # Architecture (run_mlm.py)
  layers: 6
  heads: 4
  hidden: 256
  ffn: 1024
  train_epochs: 25
  effective_batch_size: 64
  learning_rate: 4.0e-4
  # Tail prediction (2_graphmert/predict_tails_llm.py)
  predict_temperature: 0.4
  predict_top_p: 0.95
  predict_max_new_tokens: 512
  predict_tails_max: 50
  predict_prompt_text_max_chars: 12000
  predict_tensor_parallel_size: 1
  predict_max_model_len: 8192
  predict_gpu_memory_utilization: 0.90
  # Combine-tails LLM init (2_graphmert/utils/combine_tails/combine_tails.py)
  # — separate keys so combine_tails can run on a different GPU profile than
  # predict_tails if needed.
  combine_tails_max_model_len: 4096
  combine_tails_tensor_parallel_size: 1
  # ----- Per-step Qwen3 <think>...</think> control -----
  # Defaults all FALSE (thinking ON) for the same reason as
  # extract.extract_triples_no_think — empirical regression on Purves
  # showed quality collapse without thinking. Pair with extract.max_tokens
  # >= 32768 to keep responses from truncating mid-output. One knob per
  # LLM-using script (6 total across extract + graphmert).
  #
  # Pattern-match: text → entities (substep of preprocess).
  entity_discovery_no_think: false
  # Pattern-match: text + heads → relation triples (substep of preprocess).
  add_llm_relations_no_think: false
  # Constrained generation: head + relation → list of plausible tails.
  predict_tails_no_think: false
  # Dedup/normalize tail prediction shards (substep of validate_predictions).
  combine_tails_no_think: false
  # Judgment: (head, relation, tail) → "is this triple factually consistent?"
  # (substep of validate_predictions, the second LLM in the two-LLM consensus.)
  # Real reasoning value — thinking helps the merge step (combine_tails)
  # weight votes by reasoning quality.
  fact_score_no_think: false
  combine_tails_gpu_memory_utilization: 0.90

# --- Phase: curriculum ---------------------------------------------------
curriculum:
  hop_range: [1, 5]
  num_questions: 30000   # paper-default; profiles can override
  prune_fanout: 8
  qa_check_required: true   # Jha 2026-06-04 mandate

# --- Phase: sft (matches 3_si_curriculum/training/trainer.py) ------------
sft:
  lora_r: 32                  # was lora_rank: 16 — code uses 32
  lora_alpha: 64              # was 32 — code uses 64
  lora_dropout: 0.05
  block_size: 32768
  # DataLoader workers per rank. RunPod single-node 2 is fine; SLURM with
  # --cpus-per-task=4 should drop to 1 to avoid oversubscription.
  dataloader_num_workers: 2
  dataloader_prefetch_factor: 2

# --- Phase: rl (matches 3_si_curriculum/RL/rl_training.py) --------------
rl:
  algorithm: grpo
  learning_rate: 8.0e-7              # was 2.0e-6 — code uses 8e-7
  beta: 0.12                          # was 0.04 — code uses 0.12 (KL penalty)
  num_generations: 4                  # was n_completions
  max_completion_length: 1280         # was max_completion_tokens: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 10                # was train_epochs: 3 (in sft section)
  max_grad_norm: 1.0
  eval_size: 100
  eval_steps: 50
  save_steps: 100
  generation_dump_every: 25
  reward_source: kg_path_alignment
  # GRPO rollout sampling — used by GRPOConfig in rl_training.py
  generation_temperature: 0.6
  generation_top_p: 0.9
  generation_repetition_penalty: 1.15
  # Smooth length-penalty curve. Soft start = no penalty; hard cap = full
  # penalty. Tunable per domain (long-thinking vs short-answer).
  length_penalty_soft_start: 550
  length_penalty_hard_cap: 1500
  # Path-alignment reward gates on the first N tokens of <think>.
  path_alignment_thinking_tokens: 550
