# configs/pipeline_catalog.yaml
# ============================================================================
# THE single authored source of pipeline structure: every phase/step id, their
# order, and human-facing metadata. `manifest.py catalog` projects this file
# VERBATIM into the static pipeline_catalog.json the UI/S3 consume (pure
# yaml->json — no code merge, so the artifact can only ever contain these ids).
#
# IDs (the keys under `steps:`) are the FROZEN join key. This file uses the
# STANDARDIZED ids; the code STEPS in scripts/phases/*.sh have not all been
# renamed/split to match yet. `manifest.py conformance` verifies the code maps
# onto these ids, absorbing the two documented, temporary gaps declared below
# (id_aliases + split_pending) so it stays green until Phase B lands the
# execution changes.
# ============================================================================

schema_version: 1        # bump when a catalog ENTRY's shape changes (field add/rename)
catalog_version: 1       # bump when STRUCTURE changes (phase/step add/remove/reorder/id-rename)

# ---- self schema: documents the shape below (not consumed at runtime) -------
_schema:
  keyed_by: "phase id -> steps -> step id (snake_case, frozen; must match STEPS in scripts/phases/*.sh)"
  authored_here:                 # human copy — edit freely (display/desc are cosmetic; ref is provenance)
    display_name:      "string — short human label from paper/README"
    short_description: "string — one line, for dashboard rows"
    description:       "block string — multi-line detail, for the UI detail panel"
    ref:                         # structured provenance; all sub-fields optional
      paper_name: "string — paper title / short name"
      arxiv_url:  "string — https://arxiv.org/abs/<id>"
      section:    "string — e.g. 4.4"
      page:       "string — e.g. 19-20"
      readme:     "string — e.g. P2 §2.7 (human locator)"
      readme_url: "string — README URL w/ Part anchor, e.g. .../README.md#part-2--graphmert-expansion"
    kind:              "enum — llm | graphmert | train | transform | deploy | noop"
  phase_fields:                  # phase-level only
    virtual: "bool (optional) — true if the phase has NO scripts/phases/*.sh yet; drift check skips it"
  derived_elsewhere:             # do NOT author here
    id:     "the key itself; from STEPS (code)"
    order:  "step position; from STEPS order (code)"
    venv:   "from STEP_VENV (code)"
    status: "status/timing/outcome; from run_manifest.json (per run)"
  notes:
    - "Renaming an id is a breaking change: bump catalog_version + migrate manifests."
    - "Papers: 'KG-Driven Expert-Level Reasoning for Neuroscience' (arxiv 2605.25183) covers the 5 pipeline phases (§4.1-4.5); 'GraphMERT' (arxiv 2510.09580) covers the graphmert internals (§4.3-4.4)."
    - "Orchestration has 6 phases but the paper folds SFT+RL into one phase (§4.5)."
    - "deploy is a PRODUCT phase (not in the papers), flagged virtual:true until scripts/phases/deploy.sh exists; drift check skips virtual phases."

# ---- migration reconciliation (consumed by `manifest.py conformance`) -------
# Documents the two KNOWN, temporary gaps between the code STEPS in
# scripts/phases/*.sh and the standardized ids above, so conformance passes
# WITHOUT yet touching execution code. Both shrink to empty as Phase A/B land.
#
# id_aliases: a code STEP still uses the OLD id (key); it corresponds to the
#   catalog id (value). Deferred code rename removes the entry. (Also the source
#   of truth for resolving an old `--step <old_id>` to its current name.)
id_aliases:
  normalize:    build_graph        # extract.sh  step_normalize    -> catalog build_graph
  cache:        finalize_seed_kg   # extract.sh  step_cache        -> catalog finalize_seed_kg
  setup_reward: prepare_rl_dataset # rl.sh       step_setup_reward -> catalog prepare_rl_dataset
#
# split_pending: one COARSE code STEP (key) maps to the CONTIGUOUS catalog steps
#   (value) it will be split into in Phase B (an execution change — new run_step
#   calls, manifest granularity, resume points). Until then the single code step
#   legitimately covers all of them. Keyed by phase id.
split_pending:
  graphmert:
    preprocess:           [entity_discovery, find_heads, add_relations, clean_relations, build_dataset]
    validate_predictions: [combine_tails, fact_score]

# ============================================================================
phases:

  # -------------------------------------------------------------------------
  extract:
    display_name: "Extract"
    short_description: "Parse the corpus and extract a seed knowledge graph."
    description: |
      Phase 1: parse the source PDF into text units and extract typed entities +
      directed relational triples with an LLM, producing the seed KG
      (kg_final.{csv,parquet}) that every downstream phase consumes.
    ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.1", page: "7-8", readme: "P1", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-1--seed-kg-generation" }
    steps:
      parse_pdf:
        display_name: "Parse PDF"
        short_description: "Convert the source PDF into raw text."
        description: "Digitised-PDF → structured text units, before chunking."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.1", page: "7", readme: "", readme_url: "" }
        kind: transform
      chunk:
        display_name: "Chunk text"
        short_description: "Sliding-window chunker into ~300-token segments."
        description: "Overlapping ~300-token segments + document records for extraction."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.1", page: "7", readme: "P1 §1.3", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-1--seed-kg-generation" }
        kind: transform
      extract_triples:
        display_name: "LLM extraction"
        short_description: "Qwen3-14B extracts typed entities + relational triples per chunk."
        description: |
          Each text unit is processed by an open-weight Qwen3-14B LM to extract
          entities in a closed ontology and directed relational triples (closed
          relation vocabulary).
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.1", page: "7-8", readme: "P1 §1.4", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-1--seed-kg-generation" }
        kind: llm
      build_graph:
        display_name: "Build graph"
        short_description: "Parse extraction responses into entity + relationship tables."
        description: "graphrag step 4 — parse the LLM responses into the entity/relationship graph tables."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.1", page: "7-8", readme: "P1 §1.5", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-1--seed-kg-generation" }
        kind: transform
      finalize_seed_kg:
        display_name: "Finalise seed KG"
        short_description: "Write kg_final.{csv,parquet} — the seed KG deliverable."
        description: "graphrag step 5 — finalise and write the seed KG every downstream phase consumes."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.1", page: "8", readme: "P1 §1.5", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-1--seed-kg-generation" }
        kind: transform

  # -------------------------------------------------------------------------
  validate:
    display_name: "Validate"
    short_description: "Two-LLM consensus filter on the seed KG."
    description: |
      Phase 2: every seed triple is judged Yes/No by two independent LLM families
      (gpt-oss-20b + Mistral-Nemo-12B); a triple is kept only on full consensus.
      Runs fact-scoring on the seed KG.
    ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.2", page: "8", readme: "", readme_url: "" }
    steps:
      seed_kg_consensus:
        display_name: "Two-LLM validation"
        short_description: "Keep seed triples only if two LLM families both vote Yes."
        description: |
          The Two-LLM Validation Strategy applied to the seed KG. No distinct
          README step — reuses graphmert's fact-scoring.
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.2", page: "8", readme: "", readme_url: "" }
        kind: llm

  # -------------------------------------------------------------------------
  graphmert:
    display_name: "GraphMERT Expansion"
    short_description: "Train GraphMERT and expand the KG with predicted tails."
    description: |
      Phase 3: train GraphMERT (masked-node-modeling) on the validated seed KG,
      then predict novel tails, combine them into triples, re-validate via the
      two-LLM consensus, and merge into the expanded KG.
    ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.3", page: "8", readme: "P2", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
    steps:
      tokenize:
        display_name: "Tokenise"
        short_description: "Tokenise the corpus + create the stable tokenizer."
        description: "Adds fixed [PAD]/[MASK] ids; every downstream step loads this tokenizer."
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "5.1.1", page: "23", readme: "P2 §2.1", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: transform
      entity_discovery:
        display_name: "Entity discovery"
        short_description: "Mine head-entity mentions in each tokenized chunk (LLM)."
        description: |
          'Entity Linking' step. In GraphMERT (medical) this used SapBERT+UMLS; the
          neuroscience pipeline replaces that with LLM/closed-vocab head discovery.
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.3.1", page: "17", readme: "P2 §2.2", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: llm
      find_heads:
        display_name: "Find head positions"
        short_description: "Locate exact token positions of discovered heads."
        description: "Maps each discovered head entity to exact token positions in the chunk."
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.3.1", page: "17", readme: "P2 §2.2", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: transform
      add_relations:
        display_name: "Relation matching"
        short_description: "Assign seed-KG relations to discovered entities via LLM."
        description: "'Contextual Triple Selection' — attach relations to head entities."
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.3.2", page: "17", readme: "P2 §2.3", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: llm
      clean_relations:
        display_name: "Clean relations"
        short_description: "Filter/clean and split relations into train/eval."
        description: "Cleans and validates matched relations; splits into train/eval datasets."
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.3.2", page: "17", readme: "P2 §2.3", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: transform
      build_dataset:
        display_name: "Build training dataset"
        short_description: "Co-occurrence grounding → GraphMERT training samples."
        description: |
          'Seed KG Injection' — for each (head, relation, tail), find text where head
          AND tail co-occur and build the leafy-chain-graph training samples.
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.3.3", page: "18", readme: "P2 §2.4", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: transform
      train_mnm:
        display_name: "Train GraphMERT"
        short_description: "Masked-node-modeling training of GraphMERT."
        description: "6 layers / 12 heads / 512 root nodes / 3 leaves; MNM objective."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.3", page: "8", readme: "P2 §2.5", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: train
      predict_tails:
        display_name: "Predict tails (LLM)"
        short_description: "vLLM causal LM predicts novel tails for held-out heads."
        description: "The LLM tail-prediction path. Feeds combine tails."
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.4", page: "19-20", readme: "P2 §2.6", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: llm
      predict_tails_gm:
        display_name: "Predict tails (GraphMERT MNM)"
        short_description: "Trained GraphMERT predicts top-k tail tokens (masked-node-modeling)."
        description: |
          The paper's Phase-3 tail predictor (GraphMERT MNM). Currently its output is
          NOT merged into the KG (see COMBINE_TAILS_MISWIRING §8) — rename/retire
          pending the producer decision.
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.4", page: "19-20", readme: "", readme_url: "" }
        kind: graphmert
      combine_tails:
        display_name: "Combine tails"
        short_description: "Merge predicted tail tokens into deduplicated triples."
        description: |
          Merges the per-shard predicted-tail CSVs into a single KG and
          deduplicates on (head, relation, tail). Pure transform — no LLM.
          Quality gating is fact_score alone (run after the seed KG and again
          after this expansion). Fixed upstream in dc5bb46 — see
          COMBINE_TAILS_MISWIRING (RESOLVED).
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.4", page: "19-20", readme: "P2 §2.7", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: transform
      fact_score:
        display_name: "Two-LLM fact validation"
        short_description: "Sole quality gate — two-LLM consensus on the merged expansion."
        description: "Two-LLM Yes/No consensus (same gate as the seed KG), applied to the merged GraphMERT expansion. The ONLY quality filter in Part 2 — combine_tails only merges/dedups, it does not filter."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.3", page: "8", readme: "P2 §2.7", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: llm
      expand_kg:
        display_name: "Expand KG"
        short_description: "Merge seed KG + validated expansion into the final KG."
        description: "Seed ∪ validated-expansion → final_relationships.parquet."
        ref: { paper_name: "GraphMERT", arxiv_url: "https://arxiv.org/abs/2510.09580v2", section: "4.4", page: "20", readme: "P2 §2.7", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-2--graphmert-expansion" }
        kind: transform

  # -------------------------------------------------------------------------
  curriculum:
    display_name: "Curriculum Generation"
    short_description: "Traverse KG paths → multi-hop QA curriculum (Gemini + two-LLM check)."
    description: |
      Phase 4: depth-first traversal of the final KG for 1-5 hop paths, pruned for
      informativeness, converted to natural-language MCQs with CoT traces, then
      cross-checked by two LLM families.
    ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9", readme: "P3", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
    steps:
      path_traversal:
        display_name: "Path traversal"
        short_description: "Depth-first traversal of the KG for 1-5 hop paths."
        description: "Annotates KG triples with hop distance; builds the multi-hop path manifest."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9", readme: "P3 §3.1", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: transform
      prune_paths:
        display_name: "Prune paths"
        short_description: "Hub-node removal / relation filtering / transitive-redundancy pruning."
        description: "Config-driven pruning inside generate_curriculum (no-op orchestration step)."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9", readme: "P3 §3.1", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: noop
      generate_qa_pair:
        display_name: "Generate QA pairs"
        short_description: "Gemini generates bare MCQ Q&A pairs from sampled paths."
        description: "Stage 'pair' — natural-language MCQs from KG paths."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9", readme: "P3 §3.1", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: llm
      validate_qa_pair:
        display_name: "Validate QA pairs"
        short_description: "One non-Gemini reasoning LLM checks each pair."
        description: "Stage 'validate_pair' — a single-LLM correctness check on QA pairs."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9", readme: "P3 §3.2", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: llm
      generate_qa_item:
        display_name: "Generate QA items (CoT)"
        short_description: "Gemini adds step-by-step reasoning traces."
        description: "Stage 'item' — attach <think>/<answer> CoT reasoning traces to each pair."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9", readme: "P3 §3.1", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: llm
      validate_qa_item:
        display_name: "Two-LLM QA verification"
        short_description: "Two non-Gemini LLMs cross-check final QA items."
        description: "Two-LLM consensus on final items (stamps per-grader verdicts)."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9", readme: "P3 §3.2", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: llm
      assemble_curriculum:
        display_name: "Assemble curriculum"
        short_description: "Assemble verified items into the final curriculum."
        description: "Collate verified QA items into curriculum_verified.json for SFT/RL."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.4", page: "9-10", readme: "", readme_url: "" }
        kind: transform

  # -------------------------------------------------------------------------
  sft:
    display_name: "Supervised Fine-Tuning"
    short_description: "LoRA SFT on the verified curriculum."
    description: |
      Phase 5 (SFT half): LoRA SFT on 1-hop and 2-hop QA items to instil axiomatic
      facts and the <think>/<answer> CoT format, then merge the adapter into
      full-precision weights for RL.
    ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.5", page: "10", readme: "P3", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
    steps:
      prepare_data:
        display_name: "Prepare SFT dataset"
        short_description: "Tokenise curriculum Q&A into the SFT dataset."
        description: "Apply chat template; emit train/test DatasetDict."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.5", page: "10", readme: "P3 §3.3", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: transform
      train_lora:
        display_name: "SFT training (LoRA)"
        short_description: "LoRA fine-tune the base model on the curriculum."
        description: "LoRA SFT (TRL SFTTrainer)."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.5", page: "10", readme: "P3 §3.4", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: train
      merge_lora:
        display_name: "Merge LoRA adapter"
        short_description: "Fold the SFT LoRA adapter into full-precision base weights."
        description: "Deployable full-weights SFT model for RL."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.5", page: "10", readme: "P3 §3.5", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: transform
      eval_sft:
        display_name: "Evaluate SFT"
        short_description: "(operator-run) multi-checkpoint eval."
        description: "No-op in the pipeline; operator runs multi-checkpoint eval separately."
        ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "6.4", page: "18", readme: "P3 Step 8", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
        kind: noop

  # -------------------------------------------------------------------------
  rl:
    display_name: "Reinforcement Learning"
    short_description: "GRPO with KG-path-derived reward on the merged SFT model."
    description: |
      Phase 5 (RL half): GRPO on held-out 2-hop prompts, rewarding KG-path-grounded
      reasoning (implicit, verifiable reward from path traversal), starting from the
      merged SFT checkpoint.
    ref: { paper_name: "KG-Driven Expert-Level Reasoning for Neuroscience", arxiv_url: "https://arxiv.org/abs/2605.25183v2", section: "4.5", page: "10", readme: "P3", readme_url: "https://github.com/scient-lab/neuro_SI_pipeline/blob/main/README.md#part-3--si-curriculum-sft--rl" }
    steps:
      prepare_rl_dataset:
        display_name: "Prepare RL dataset"
        short_description: "Slice the verified curriculum into GRPO prompts + path rewards."
        description: "Build GRPO prompts and KG-path reward signals."
