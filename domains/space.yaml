# --- Few-shot examples ---------------------------------------------------
few_shot_examples:
  - text: |
      The Sun is a main-sequence star located in the Milky Way galaxy. It is
      composed mostly of hydrogen and helium and is powered by nuclear fusion in
      its core, where hydrogen fuses into helium. The Sun's gravity holds the
      planets of the Solar System in orbit. In about five billion years the Sun
      will evolve into a red giant and finally collapse into a white dwarf. Much
      more massive stars instead end their lives in a supernova, which can leave
      behind a neutron star or a black hole.
    triples:
      - [sun, type_of, main-sequence star]
      - [sun, located_in, milky way]
      - [sun, composed_of, hydrogen]
      - [sun, composed_of, helium]
      - [sun, powered_by, nuclear fusion]
      - [hydrogen, fuses_into, helium]
      - [sun, exerts_gravity_on, planets]
      - [planets, orbits, sun]
      - [sun, part_of, solar system]
      - [sun, evolves_into, red giant]
      - [red giant, collapses_into, white dwarf]
      - [massive star, undergoes, supernova]
      - [supernova, results_in, neutron star]
      - [supernova, results_in, black hole]

  - text: |
      The James Webb Space Telescope was launched by an Ariane 5 rocket from
      the Guiana Space Centre. JWST carries a segmented primary mirror and
      infrared instruments that observe distant galaxies and measure their
      redshifts. The telescope operates near the Sun-Earth L2 Lagrange point.
    triples:
      - [james webb space telescope, launched_by, ariane 5 rocket]
      - [james webb space telescope, launched_from, guiana space centre]
      - [james webb space telescope, carries, segmented primary mirror]
      - [james webb space telescope, carries, infrared instruments]
      - [infrared instruments, observes, distant galaxies]
      - [infrared instruments, measures, redshift]
      - [james webb space telescope, located_in, sun-earth l2 lagrange point]
      - [sun-earth l2 lagrange point, type_of, lagrange point]

  - text: |
      A Hohmann transfer uses two engine burns to move a spacecraft from one
      circular orbit to another. The first burn places the spacecraft onto an
      elliptical transfer orbit, and the second burn circularizes the spacecraft
      at the target orbit. The maneuver requires delta-v and is commonly used
      for efficient orbital transfers.
    triples:
      - [hohmann transfer, uses, two engine burns]
      - [first burn, transfers_to, elliptical transfer orbit]
      - [second burn, results_in, target circular orbit]
      - [hohmann transfer, required_for, efficient orbital transfer]
      - [hohmann transfer, has_property, delta-v]
      - [spacecraft, transfers_to, target orbit]

# --- Focus instructions --------------------------------------------------
focus_instructions: |
  Extract structured knowledge from space science, astronomy, astrophysics,
  planetary science, orbital mechanics, and space engineering content.
  Extract ONLY information directly stated in the source text; do not infer,
  generalize, or use external scientific knowledge. Use lowercase canonical
  entity names, expand abbreviations when the expansion appears in the text
  (e.g., JWST → james webb space telescope), and output exactly one allowed
  relation per triple. Prefer physically specific relations such as orbits,
  composed_of, fuses_into, evolves_into, emits, measures, launched_by, or
  required_for over generic associated_with whenever the text explicitly
  supports them.

# --- Expert role ---------------------------------------------------------
domain_expert_role: "expert space scientist"

