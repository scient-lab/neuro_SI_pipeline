add_llm_relations_examples:
  - user: |-
      Input:
      Sequence:
      The Sun is composed mostly of hydrogen and helium and is powered by nuclear fusion, in which hydrogen fuses into helium.

      heads: ["Sun", "hydrogen", "helium", "nuclear fusion"]

      Output:
    assistant: |-
      {
          "Sun": ["composed_of"],
          "hydrogen": ["fuses_into"],
          "helium": [],
          "nuclear fusion": []
      }
    explanation: |-
      The Sun is composed of hydrogen (and helium) -> composed_of.
      Hydrogen fuses into helium -> fuses_into.
      The same text says the Sun is powered by fusion, but only one relation per head is requested, and 'composed_of' is the dominant one.
      helium and nuclear fusion are not framed as relation sources here -> [].

  - user: |-
      Input:
      Sequence:
      A massive star undergoes a supernova, which can leave behind a neutron star or a black hole. A black hole is characterized by an event horizon.

      heads: ["massive star", "supernova", "neutron star", "black hole", "event horizon"]

      Output:
    assistant: |-
      {
          "massive star": ["undergoes"],
          "supernova": ["results_in"],
          "neutron star": [],
          "black hole": ["characterized_by"],
          "event horizon": []
      }
    explanation: |-
      A massive star undergoes a supernova -> undergoes.
      The supernova results in a neutron star (or black hole) -> results_in.
      A black hole is characterized by an event horizon -> characterized_by.
      neutron star and event horizon are not relation sources here -> [].

  - user: |-
      Input:
      Sequence:
      The Sun emits solar wind. Earth's magnetosphere surrounds Earth and interacts with the solar wind, reducing the direct impact of charged particles on the upper atmosphere.

      heads: ["sun", "solar wind", "earth magnetosphere", "earth", "charged particles", "upper atmosphere"]

      Output:
    assistant: |-
      {
          "sun": ["emits"],
          "solar wind": ["interacts_with"],
          "earth magnetosphere": ["surrounds"],
          "earth": [],
          "charged particles": [],
          "upper atmosphere": []
      }
    explanation: |-
      The text explicitly states that the Sun emits solar wind -> emits.
      The solar wind interacts with the magnetosphere -> interacts_with.
      The magnetosphere surrounds Earth -> surrounds.
      Other heads are not directly used as relation sources under the one-relation constraint.

  - user: |-
      Input:
      Sequence:
      The James Webb Space Telescope was launched by an Ariane 5 rocket and operates near the Sun-Earth L2 Lagrange point. Its infrared instruments observe distant galaxies and measure redshift.

      heads: ["james webb space telescope", "ariane 5 rocket", "sun-earth l2 lagrange point", "infrared instruments", "distant galaxies", "redshift"]

      Output:
    assistant: |-
      {
          "james webb space telescope": ["launched_by"],
          "ariane 5 rocket": [],
          "sun-earth l2 lagrange point": [],
          "infrared instruments": ["observes"],
          "distant galaxies": [],
          "redshift": []
      }
    explanation: |-
      JWST was launched by Ariane 5 -> launched_by.
      Infrared instruments observe distant galaxies -> observes.
      The same sentence also says the instruments measure redshift, but only one relation per head is requested here.

  - user: |-
      Input:
      Sequence:
      Planetary orbits are governed by Kepler's laws. The cosmic microwave background provides evidence for the Big Bang model.

      heads: ["planetary orbits", "kepler's laws", "cosmic microwave background", "big bang model"]

      Output:
    assistant: |-
      {
          "planetary orbits": ["governed_by"],
          "kepler's laws": [],
          "cosmic microwave background": ["evidence_for"],
          "big bang model": []
      }
    explanation: |-
      Planetary orbits are governed by Kepler's laws -> governed_by.
      The CMB is explicitly evidence for the Big Bang model -> evidence_for.
      kepler's laws and big bang model are the tails here, not relation sources -> [].

