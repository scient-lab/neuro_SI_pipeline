# domains/space.yaml - Space / astronomy SLM domain.
#
# Broad space-science domain (astronomy, astrophysics, spaceflight) — NOT
# any single mission or company. Mirrors the paper's textbook→SLM methodology;
# corpus is astronomy/spaceflight prose (Wikipedia; upgradeable to the free
# CC-BY OpenStax Astronomy 2e textbook).
#
# Consumed by pipeline_config.py via SI_DOMAIN=space.
#   CORPUS_PATH=corpus/space/source_txt ./scripts/pipeline.sh --profile pilot --domain space

domain: space
description: Specialized SLM for space science — astronomy, astrophysics, and spaceflight

# --- Entity categories ---------------------------------------------------
# 8 main types. Subcategories in `description` are extractor guidance only.
entity_categories:
  - id: CELESTIAL_BODY
    description: |
      Star; Planet; Moon; Dwarf Planet; Asteroid; Comet; Galaxy; Black Hole;
      Neutron Star; White Dwarf; Red Giant; Nebula; Quasar; Pulsar
  - id: ASTRONOMICAL_PROCESS
    description: |
      Nuclear Fusion; Stellar Evolution; Star Formation; Supernova; Accretion;
      Gravitational Collapse; Expansion of the Universe; Nucleosynthesis;
      Solar Flare; Eclipse
  - id: PHYSICAL_CONCEPT
    description: |
      Mass; Luminosity; Temperature; Redshift; Velocity; Distance; Gravity;
      Radiation; Light; Element (Hydrogen, Helium); Energy; Spectrum; Wavelength
  - id: COSMIC_STRUCTURE
    description: |
      Solar System; Galaxy Cluster; Orbit; Ring System; Interstellar Medium;
      Habitable Zone; Asteroid Belt; Kuiper Belt; Universe; Spacetime
  - id: SPACECRAFT
    description: |
      Probe; Satellite; Rover; Space Telescope; Rocket; Launch Vehicle;
      Space Station; Lander; Orbiter
  - id: MISSION
    description: |
      Space Mission; Program; Crewed Mission; Flyby; Sample Return;
      Exploration Program
  - id: PHYSICAL_LAW
    description: |
      Physical Law; Theory; Model; Principle; Equation (Kepler's Laws,
      General Relativity, Newton's Gravitation, Hubble's Law)
  - id: ORGANIZATION
    description: |
      Space Agency; Company; Observatory; Institution (NASA, ESA, SpaceX)

# --- Relations -----------------------------------------------------------
# Closed set (40) — the only allowed predicates in extracted triples.
relations:
  - { id: part_of,           description: "X is a structural component or member of Y." }
  - { id: contains,          description: "Y contains X as a constituent." }
  - { id: located_in,        description: "X is located within region/structure Y." }
  - { id: orbits,            description: "Body X orbits body Y." }
  - { id: orbited_by,        description: "Body X is orbited by Y (inverse of orbits)." }
  - { id: has_satellite,     description: "Body X has a natural or artificial satellite Y." }
  - { id: composed_of,       description: "X is composed of material/element Y." }
  - { id: emits,             description: "X emits radiation, light, or particles Y." }
  - { id: powered_by,        description: "Process or object X is powered by energy source Y." }
  - { id: forms_from,        description: "Body or structure X forms from precursor Y." }
  - { id: evolves_into,      description: "X evolves into a later stage Y." }
  - { id: collapses_into,    description: "X gravitationally collapses into Y." }
  - { id: fuses_into,        description: "Element X fuses into heavier element Y." }
  - { id: exerts_gravity_on, description: "X exerts gravitational force on Y." }
  - { id: attracts,          description: "X gravitationally attracts Y." }
  - { id: causes,            description: "X causes Y." }
  - { id: results_in,        description: "X results in outcome Y." }
  - { id: undergoes,         description: "Body X undergoes process Y." }
  - { id: type_of,           description: "X is a type or class of Y." }
  - { id: characterized_by,  description: "X is characterized by feature/property Y." }
  - { id: has_property,      description: "X has physical quantity or value Y." }
  - { id: measured_in,       description: "Quantity X is measured in unit Y." }
  - { id: discovered_by,     description: "X was discovered by person or instrument Y." }
  - { id: observed_by,       description: "X is observed by telescope or mission Y." }
  - { id: studies,           description: "Mission or instrument X studies target Y." }
  - { id: explored_by,       description: "Body X was explored by mission or spacecraft Y." }
  - { id: landed_on,         description: "Spacecraft X landed on body Y." }
  - { id: flew_by,           description: "Spacecraft X flew by body Y." }
  - { id: launched_by,       description: "Spacecraft or mission X was launched by organization Y." }
  - { id: operated_by,       description: "Spacecraft or mission X is operated by organization Y." }
  - { id: carries,           description: "Spacecraft X carries instrument or payload Y." }
  - { id: propelled_by,      description: "Spacecraft X is propelled by propulsion system Y." }
  - { id: governed_by,       description: "Phenomenon X is governed by physical law Y." }
  - { id: described_by,      description: "X is described or modeled by theory Y." }
  - { id: predicted_by,      description: "X was predicted by theory Y." }
  - { id: proposed_by,       description: "Theory or model X was proposed by person Y." }
  - { id: associated_with,   description: "X is contextually associated with Y without a stated mechanism." }
  - { id: has_phase,         description: "Process X has a stage or phase Y." }
  - { id: located_at,        description: "X is located at distance or position Y." }
  - { id: rotates_around,    description: "X rotates or revolves around axis/point Y." }

# --- Few-shot examples ---------------------------------------------------
few_shot_examples:
  - text: |
      The Sun is a main-sequence star located in the Milky Way galaxy. It is
      composed mostly of hydrogen and helium and is powered by nuclear fusion in
      its core, where hydrogen fuses into helium. The Sun's gravity holds the
      planets of the Solar System in orbit. In about five billion years the Sun
      will evolve into a red giant and finally collapse into a white dwarf. Much
      more massive stars instead end their lives in a supernova, which can leave
      behind a neutron star or a black hole.
    triples:
      - [sun, type_of, main-sequence star]
      - [sun, located_in, milky way]
      - [sun, composed_of, hydrogen]
      - [sun, composed_of, helium]
      - [sun, powered_by, nuclear fusion]
      - [hydrogen, fuses_into, helium]
      - [sun, exerts_gravity_on, planets]
      - [planets, orbits, sun]
      - [sun, part_of, solar system]
      - [sun, evolves_into, red giant]
      - [red giant, collapses_into, white dwarf]
      - [massive star, undergoes, supernova]
      - [supernova, results_in, neutron star]
      - [supernova, results_in, black hole]

# --- Focus instructions --------------------------------------------------
focus_instructions: |
  Extract structured knowledge from space-science content about celestial
  bodies, astrophysical processes, spaceflight, and the laws that govern them.

  - Extract ONLY information directly stated in the source text. Do not infer,
    generalize, or use outside astronomy knowledge.
  - Maximize coverage: extract every entity and every explicitly stated
    relationship.
  - Use lowercase, canonical names (e.g. "the sun" -> "sun", "milky way",
    "black hole", "nuclear fusion").
  - Resolve abbreviations to their expanded form when the text gives it
    (e.g. "ISS" -> "international space station", "JWST" -> "james webb space
    telescope", "CMB" -> "cosmic microwave background").
  - Treat synonyms like "revolves around" and "orbits" as the same relation;
    pick the relation id whose meaning the text expresses.
  - Output exactly ONE relation per triple (no compound relations).

# --- Expert role ---------------------------------------------------------
domain_expert_role: "expert astrophysicist"

