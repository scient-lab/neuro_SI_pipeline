# Per-phase prompt content slots (see docs/PROMPT_MIGRATION.md)
# =============================================================================

# --- relation_meanings (combine_tails-style; add_llm_relations + combine_tails)
relation_meanings: |
  Relation meanings (space-science KG). Use the direction exactly as written.

  Structure / location
  * part_of - component -> whole: "earth" part_of "solar system"
  * contains - whole -> component: "solar system" contains "asteroid belt"
  * located_in - entity -> region: "sun" located_in "milky way"
  * orbits - body -> central body: "moon" orbits "earth"
  * has_satellite - body -> satellite: "jupiter" has_satellite "europa"
  * located_at - entity -> distance/position: "proxima centauri" located_at "4.2 light-years"

  Composition / emission
  * composed_of - body -> material: "sun" composed_of "hydrogen"
  * emits - source -> radiation: "black hole" emits "x-rays"
  * powered_by - process/object -> energy source: "star" powered_by "nuclear fusion"
  * fuses_into - element -> heavier element: "hydrogen" fuses_into "helium"

  Dynamics / gravity
  * exerts_gravity_on - X -> Y: "sun" exerts_gravity_on "planets"
  * attracts - X gravitationally attracts Y: "earth" attracts "moon"
  * governed_by - phenomenon -> law: "planetary orbits" governed_by "kepler's laws"

  Evolution / process
  * forms_from - body -> precursor: "star" forms_from "molecular cloud"
  * evolves_into - X -> later stage: "red giant" evolves_into "white dwarf"
  * collapses_into - X -> remnant: "massive star core" collapses_into "black hole"
  * undergoes - body -> process: "massive star" undergoes "supernova"
  * causes - direct cause: "stellar collapse" causes "supernova"
  * results_in - outcome: "supernova" results_in "neutron star"

  Observation / spaceflight
  * discovered_by - object -> discoverer: "neptune" discovered_by "johann galle"
  * observed_by - object -> instrument: "deep field galaxies" observed_by "hubble space telescope"
  * studies - mission/instrument -> target: "cassini" studies "saturn"
  * explored_by - body -> mission: "mars" explored_by "perseverance"
  * landed_on - spacecraft -> body: "apollo 11" landed_on "moon"
  * flew_by - spacecraft -> body: "voyager 2" flew_by "neptune"
  * launched_by - craft/mission -> org: "james webb space telescope" launched_by "nasa"
  * carries - spacecraft -> payload: "hubble space telescope" carries "wide field camera"

  Type / property
  * type_of - X is a kind of Y: "red giant" type_of "star"
  * characterized_by - X -> defining feature: "black hole" characterized_by "event horizon"
  * has_property - X -> quantity: "sun" has_property "surface temperature"
  * described_by - X -> theory: "spacetime curvature" described_by "general relativity"

# --- predict_tails_examples (predict_tails prompt few-shot)
predict_tails_examples:
  - text: "The Moon orbits the Earth and is its only natural satellite."
    head: "moon"
    relation: "orbits"
    json:
      head: "moon"
      relation: "orbits"
      tails: ["earth"]
      reason_if_none: ""
  - text: "The Sun is composed mainly of hydrogen and helium."
    head: "sun"
    relation: "composed_of"
    json:
      head: "sun"
      relation: "composed_of"
      tails: ["hydrogen", "helium"]
      reason_if_none: ""
  - text: "A supernova can leave behind a neutron star or a black hole."
    head: "supernova"
    relation: "results_in"
    json:
      head: "supernova"
      relation: "results_in"
      tails: ["neutron star", "black hole"]
      reason_if_none: ""

