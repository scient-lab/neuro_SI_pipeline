# --- relation_meanings_detailed ----------------------------------------------
relation_meanings_detailed: |
  These relations are space KG relations.

  Structural and spatial relations:
  * part_of - X is a component, subsystem, region, or phase of Y.
    Example: primary mirror part_of james webb space telescope.
  * contains - X contains Y as a component, object, population, or region.
    Example: solar system contains earth.
  * located_in - X is spatially located in, at, or near Y.
    Example: jwst located_in sun-earth l2 lagrange point.
  * located_at - X is located at a distance or position Y.
    Example: proxima centauri located_at 4.2 light-years.
  * surrounds - X surrounds or envelops Y.
    Example: earth magnetosphere surrounds earth.
  * boundary_of - X marks the boundary, limit, or interface of Y.
    Example: event horizon boundary_of black hole.

  Orbital and dynamical relations:
  * orbits - X orbits Y gravitationally.
    Example: earth orbits sun.
  * orbited_by - X is orbited by Y.
    Example: earth orbited_by moon.
  * has_satellite - X has natural/artificial satellite Y.
    Example: jupiter has_satellite europa.
  * rotates_about - X rotates about Y.
    Example: earth rotates_about rotation axis.
  * gravitationally_bound_to - X and Y are in a gravitationally bound system.
    Example: moon gravitationally_bound_to earth.
  * perturbs_orbit_of - X changes or perturbs Y's orbit.
    Example: jupiter perturbs_orbit_of asteroid.
  * exerts_gravity_on - X exerts gravitational force on Y.
    Example: sun exerts_gravity_on planets.
  * transfers_to - X transfers to destination orbit/body/state Y.
    Example: spacecraft transfers_to mars transfer orbit.
  * flies_by - X performs a flyby of Y.
    Example: voyager 2 flies_by neptune.
  * lands_on - X lands on Y.
    Example: perseverance rover lands_on mars.
  * docks_with - X docks with Y.
    Example: crew dragon docks_with international space station.

  Observation and measurement relations:
  * observes - X observes Y as a scientific target.
    Example: hubble space telescope observes galaxy.
  * measures - X measures quantity or property Y.
    Example: spectrometer measures redshift.
  * measured_in - quantity X is measured in unit Y.
    Example: orbital period measured_in years.
  * detects - X detects object, signal, or event Y.
    Example: radio telescope detects pulsar.
  * images - X captures images of Y.
    Example: mars reconnaissance orbiter images mars surface.
  * maps - X maps surface, field, or distribution Y.
    Example: lunar orbiter maps moon gravity field.
  * samples - X collects physical sample from Y.
    Example: osiris-rex samples asteroid bennu.
  * communicates_with - X sends/receives communication with Y.
    Example: mars rover communicates_with deep space network.
  * discovered_by - X was discovered by Y.
    Example: neptune discovered_by johann galle.
  * studies - X studies target Y.
    Example: cassini studies saturn.
  * explored_by - X was explored by mission/spacecraft Y.
    Example: mars explored_by perseverance.

  Physical interaction, composition, and emission relations:
  * emits - X emits Y.
    Example: sun emits solar wind.
  * absorbs - X absorbs Y.
    Example: atmosphere absorbs ultraviolet radiation.
  * reflects - X reflects Y.
    Example: moon reflects sunlight.
  * scatters - X scatters Y.
    Example: atmosphere scatters blue light.
  * ionizes - X ionizes Y.
    Example: solar ultraviolet radiation ionizes upper atmosphere.
  * heats - X heats Y.
    Example: tidal forces heats io interior.
  * accelerates - X accelerates Y.
    Example: rocket engine accelerates launch vehicle.
  * composed_of - X is composed of material/element Y.
    Example: sun composed_of hydrogen.
  * fuses_into - element X fuses into heavier element Y.
    Example: hydrogen fuses_into helium.
  * powered_by - X is powered by energy source Y.
    Example: curiosity rover powered_by radioisotope thermoelectric generator.
  * interacts_with - X physically interacts with Y when no more specific relation is stated.
    Example: solar wind interacts_with magnetosphere.

  Causal, evolutionary, and evidential relations:
  * formed_from - X formed from Y.
    Example: planet formed_from protoplanetary disk.
  * evolves_into - X evolves into Y.
    Example: red giant evolves_into white dwarf.
  * collapses_into - X gravitationally collapses into remnant Y.
    Example: massive star core collapses_into black hole.
  * undergoes - body/system X undergoes process Y.
    Example: massive star undergoes supernova.
  * has_phase - process X has stage/phase Y.
    Example: stellar evolution has_phase red giant phase.
  * causes - X causes Y.
    Example: gravitational collapse causes star formation.
  * results_in - X results in Y.
    Example: coronal mass ejection results_in geomagnetic storm.
  * triggers - X initiates Y.
    Example: solar flare triggers radio blackout.
  * associated_with - X is associated with Y without direct causal claim.
    Example: dark matter associated_with galaxy rotation curves.
  * evidence_for - X provides evidence for Y.
    Example: cosmic microwave background evidence_for big bang model.

  Engineering and mission relations:
  * launched_by - X was launched by Y.
    Example: jwst launched_by ariane 5 rocket.
  * launched_from - X was launched from Y.
    Example: apollo 11 launched_from kennedy space center.
  * operated_by - X is operated by Y.
    Example: jwst operated_by nasa.
  * built_by - X was built by Y.
    Example: mars rover built_by jet propulsion laboratory.
  * carries - X carries payload/component/instrument Y.
    Example: cassini carries huygens probe.
  * propelled_by - X is propelled by propulsion system Y.
    Example: falcon 9 propelled_by merlin engines.
  * uses - X uses method, resource, component, or principle Y.
    Example: hohmann transfer uses two engine burns.
  * controls - X controls Y.
    Example: reaction wheel controls spacecraft attitude.
  * required_for - X is necessary for Y.
    Example: delta-v required_for orbital maneuver.
  * enables - X makes Y possible or feasible.
    Example: gravity assist enables outer planet mission.
  * fails_due_to - X fails due to Y.
    Example: mission fails_due_to communication loss.

  Law, theory, classification, and property relations:
  * governed_by - phenomenon X is governed by physical law Y.
    Example: planetary orbits governed_by kepler's laws.
  * described_by - X is described/modeled by theory Y.
    Example: spacetime curvature described_by general relativity.
  * predicted_by - X was predicted by theory/model Y.
    Example: neptune predicted_by newtonian mechanics.
  * proposed_by - theory/model X was proposed by person Y.
    Example: general relativity proposed_by albert einstein.
  * type_of - X is a type/subtype/instance of Y.
    Example: mars type_of terrestrial planet.
  * has_property - X has property or parameter Y.
    Example: venus has_property dense atmosphere.
  * characterized_by - X is characterized by feature/signature Y.
    Example: black hole characterized_by event horizon.

