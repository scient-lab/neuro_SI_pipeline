# --- relation_meanings -------------------------------------------------------
relation_meanings: |
  Relation meanings (space KG). Use the direction exactly as written.

  Structure / location
  * part_of - component → whole: "primary mirror" part_of "james webb space telescope"
  * contains - whole → component: "solar system" contains "earth"
  * located_in - entity → location: "james webb space telescope" located_in "sun-earth l2 lagrange point"
  * located_at - entity → distance/position: "proxima centauri" located_at "4.2 light-years"
  * surrounds - envelope or shell surrounds target: "magnetosphere" surrounds "earth"
  * boundary_of - boundary or limit of a region: "event horizon" boundary_of "black hole"

  Orbital mechanics and motion
  * orbits - smaller object or spacecraft orbits larger body: "earth" orbits "sun"
  * orbited_by - inverse of orbits: "earth" orbited_by "moon"
  * has_satellite - body has a natural/artificial satellite: "jupiter" has_satellite "europa"
  * rotates_about - object rotates around axis/frame: "earth" rotates_about "rotation axis"
  * gravitationally_bound_to - bodies are held in a gravitational system: "moon" gravitationally_bound_to "earth"
  * perturbs_orbit_of - one body changes another orbit: "jupiter" perturbs_orbit_of "asteroid"
  * exerts_gravity_on - body exerts gravitational force on another: "sun" exerts_gravity_on "planets"
  * transfers_to - trajectory moves from source orbit/body to target: "spacecraft" transfers_to "mars transfer orbit"
  * flies_by - spacecraft passes near a target: "voyager 2" flies_by "neptune"
  * lands_on - spacecraft or lander touches down on target: "perseverance rover" lands_on "mars"
  * docks_with - spacecraft connects with target: "crew dragon" docks_with "international space station"

  Observation and measurement
  * observes - telescope/instrument observes target: "hubble space telescope" observes "galaxy"
  * measures - instrument measures quantity: "spectrometer" measures "redshift"
  * measured_in - quantity is measured in a unit: "orbital period" measured_in "years"
  * detects - detector identifies signal/object: "radio telescope" detects "pulsar"
  * images - camera or telescope images target: "mars reconnaissance orbiter" images "mars surface"
  * maps - mission or instrument maps field/surface: "lunar orbiter" maps "moon gravity field"
  * samples - mission collects material: "osiris-rex" samples "asteroid bennu"
  * communicates_with - spacecraft exchanges signal: "mars rover" communicates_with "deep space network"
  * discovered_by - object discovered by person/instrument: "neptune" discovered_by "johann galle"
  * studies - mission/instrument studies a target: "cassini" studies "saturn"
  * explored_by - body explored by mission/spacecraft: "mars" explored_by "perseverance"

  Physical interactions, composition, emission
  * emits - source emits radiation, particles, or matter: "sun" emits "solar wind"
  * absorbs - object absorbs incoming radiation or particles: "atmosphere" absorbs "ultraviolet radiation"
  * reflects - object reflects radiation: "moon" reflects "sunlight"
  * scatters - medium scatters radiation/particles: "atmosphere" scatters "blue light"
  * ionizes - radiation or particles ionize material: "solar ultraviolet radiation" ionizes "upper atmosphere"
  * heats - source increases thermal state: "tidal forces" heats "io interior"
  * accelerates - force/engine accelerates object: "rocket engine" accelerates "launch vehicle"
  * composed_of - body is made of material/element: "sun" composed_of "hydrogen"
  * fuses_into - element fuses into a heavier element: "hydrogen" fuses_into "helium"
  * powered_by - system/process powered by energy source: "mars rover" powered_by "radioisotope thermoelectric generator"
  * interacts_with - physical interaction without a more specific relation: "solar wind" interacts_with "magnetosphere"

  Formation, evolution, and causality
  * formed_from - object/process formed from precursor material: "planet" formed_from "protoplanetary disk"
  * evolves_into - source object evolves into later stage: "red giant" evolves_into "white dwarf"
  * collapses_into - object gravitationally collapses into remnant: "massive star core" collapses_into "black hole"
  * undergoes - body/system undergoes a process: "massive star" undergoes "supernova"
  * has_phase - process has a stage/phase: "stellar evolution" has_phase "red giant phase"
  * causes - direct causal relation: "gravitational collapse" causes "star formation"
  * results_in - downstream consequence: "coronal mass ejection" results_in "geomagnetic storm"
  * triggers - event initiates event/process: "solar flare" triggers "radio blackout"
  * associated_with - contextual association without direct causality: "dark matter" associated_with "galaxy rotation curves"
  * evidence_for - observation supports hypothesis: "cosmic microwave background" evidence_for "big bang model"

  Engineering and operations
  * launched_by - mission/spacecraft launched by rocket/provider: "jwst" launched_by "ariane 5"
  * launched_from - mission/spacecraft launched from site: "apollo 11" launched_from "kennedy space center"
  * operated_by - mission/system operated by organization: "jwst" operated_by "nasa"
  * built_by - component/system built by organization: "mars rover" built_by "jet propulsion laboratory"
  * carries - spacecraft carries instrument/payload: "cassini" carries "huygens probe"
  * propelled_by - spacecraft propelled by propulsion system: "falcon 9" propelled_by "merlin engines"
  * uses - system/process uses method/component: "hohmann transfer" uses "two engine burns"
  * controls - subsystem controls state/behavior: "reaction wheel" controls "spacecraft attitude"
  * required_for - necessary condition: "delta-v" required_for "orbital maneuver"
  * enables - enabling relationship: "gravity assist" enables "outer planet mission"
  * fails_due_to - failure cause: "mission" fails_due_to "communication loss"

  Laws, theory, classification, properties
  * governed_by - phenomenon governed by physical law: "planetary orbits" governed_by "kepler's laws"
  * described_by - phenomenon described/modeled by theory: "spacetime curvature" described_by "general relativity"
  * predicted_by - object/effect predicted by theory: "neptune" predicted_by "newtonian mechanics"
  * proposed_by - theory/model proposed by person: "general relativity" proposed_by "albert einstein"
  * type_of - X is a type of Y: "mars" type_of "terrestrial planet"
  * has_property - X has property Y: "venus" has_property "dense atmosphere"
  * characterized_by - X is characterized by feature/signature: "black hole" characterized_by "event horizon"

