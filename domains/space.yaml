# --- relation_meanings_detailed (add_llm_relations: longer didactic block)
relation_meanings_detailed: |
  These relations are space-science KG relations.

  Structure / location:
  * part_of - X is a component or member of Y.
    Example: earth part_of solar system.
  * contains - Y contains X as a constituent.
    Example: milky way contains solar system.
  * located_in - X is located within Y.
    Example: sun located_in milky way.
  * orbits - body X orbits central body Y.
    Example: moon orbits earth.
  * has_satellite - body X has satellite Y.
    Example: jupiter has_satellite europa.

  Composition / emission:
  * composed_of - X is made of material Y.
    Example: sun composed_of hydrogen.
  * emits - X emits radiation Y.
    Example: black hole emits x-rays.
  * powered_by - X is powered by energy source Y.
    Example: star powered_by nuclear fusion.
  * fuses_into - element X fuses into Y.
    Example: hydrogen fuses_into helium.

  Dynamics / gravity:
  * exerts_gravity_on - X exerts gravity on Y.
    Example: sun exerts_gravity_on planets.
  * governed_by - phenomenon X is governed by law Y.
    Example: planetary orbits governed_by kepler's laws.

  Evolution / process:
  * forms_from - X forms from precursor Y.
    Example: star forms_from molecular cloud.
  * evolves_into - X evolves into Y.
    Example: red giant evolves_into white dwarf.
  * collapses_into - X collapses into remnant Y.
    Example: massive star core collapses_into black hole.
  * undergoes - body X undergoes process Y.
    Example: massive star undergoes supernova.
  * causes - X causes Y.
    Example: core collapse causes supernova.
  * results_in - X results in outcome Y.
    Example: supernova results_in neutron star.

  Observation / spaceflight:
  * discovered_by - X discovered by Y.
    Example: neptune discovered_by johann galle.
  * observed_by - X observed by instrument Y.
    Example: distant galaxies observed_by hubble space telescope.
  * studies - mission X studies target Y.
    Example: cassini studies saturn.
  * explored_by - body X explored by mission Y.
    Example: mars explored_by perseverance.
  * landed_on - spacecraft X landed on body Y.
    Example: apollo 11 landed_on moon.
  * flew_by - spacecraft X flew by body Y.
    Example: voyager 2 flew_by neptune.
  * launched_by - craft X launched by org Y.
    Example: james webb space telescope launched_by nasa.

  Type / property / theory:
  * type_of - X is a kind of Y.
    Example: red giant type_of star.
  * characterized_by - X has defining feature Y.
    Example: black hole characterized_by event horizon.
  * described_by - X described by theory Y.
    Example: spacetime curvature described_by general relativity.
  * associated_with - association without a stated mechanism.
    Example: dark matter associated_with galaxy rotation curves.

# --- add_llm_relations_examples (in-context user/assistant/explanation dialogs)
add_llm_relations_examples:
  - user: |-
      Input:
      Sequence:
      The Sun is composed mostly of hydrogen and helium and is powered by nuclear fusion, in which hydrogen fuses into helium.

      heads: ["Sun", "hydrogen", "helium", "nuclear fusion"]

      Output:
    assistant: |-
      {
          "Sun": ["composed_of"],
          "hydrogen": ["fuses_into"],
          "helium": [],
          "nuclear fusion": []
      }
    explanation: |-
      The Sun is composed of hydrogen (and helium) -> composed_of.
      Hydrogen fuses into helium -> fuses_into.
      helium and nuclear fusion are not framed as relation sources here -> [].

  - user: |-
      Input:
      Sequence:
      The Moon orbits the Earth. The Sun's gravity holds the planets of the Solar System in orbit.

      heads: ["Moon", "Earth", "Sun", "planets", "Solar System"]

      Output:
    assistant: |-
      {
          "Moon": ["orbits"],
          "Earth": [],
          "Sun": ["exerts_gravity_on"],
          "planets": ["orbits"],
          "Solar System": []
      }
    explanation: |-
      The Moon orbits the Earth -> orbits.
      The Sun's gravity holds the planets -> exerts_gravity_on.
      The planets orbit (are held in orbit) -> orbits.
      Earth and Solar System are not relation sources here -> [].

  - user: |-
      Input:
      Sequence:
      A massive star undergoes a supernova, which can leave behind a neutron star or a black hole. A black hole is characterized by an event horizon.

      heads: ["massive star", "supernova", "neutron star", "black hole", "event horizon"]

      Output:
    assistant: |-
      {
          "massive star": ["undergoes"],
          "supernova": ["results_in"],
          "neutron star": [],
          "black hole": ["characterized_by"],
          "event horizon": []
      }
    explanation: |-
      A massive star undergoes a supernova -> undergoes.
      The supernova results in a neutron star (or black hole) -> results_in.
      A black hole is characterized by an event horizon -> characterized_by.
      neutron star and event horizon are not relation sources here -> [].

  - user: |-
      Input:
      Sequence:
      Apollo 11 landed on the Moon. The Hubble Space Telescope was launched by NASA and observes distant galaxies.

      heads: ["Apollo 11", "Moon", "Hubble Space Telescope", "NASA", "distant galaxies"]

      Output:
    assistant: |-
      {
          "Apollo 11": ["landed_on"],
          "Moon": [],
          "Hubble Space Telescope": ["launched_by"],
          "NASA": [],
          "distant galaxies": []
      }
    explanation: |-
      Apollo 11 landed on the Moon -> landed_on.
      The Hubble Space Telescope was launched by NASA -> launched_by.
      It also observes distant galaxies, but with one relation kept per head the dominant 'launched_by' is chosen.
      Moon, NASA, distant galaxies are not relation sources here -> [].

  - user: |-
      Input:
      Sequence:
      Planetary orbits are governed by Kepler's laws. The curvature of spacetime is described by general relativity.

      heads: ["planetary orbits", "Kepler's laws", "spacetime", "general relativity"]

      Output:
    assistant: |-
      {
          "planetary orbits": ["governed_by"],
          "Kepler's laws": [],
          "spacetime": ["described_by"],
          "general relativity": []
      }
    explanation: |-
      Planetary orbits are governed by Kepler's laws -> governed_by.
      The curvature of spacetime is described by general relativity -> described_by.
      Kepler's laws and general relativity are the tails here, not relation sources -> [].

