# Worked example paragraph (matches few_shot_examples[0].text).
extract_example_text: 'The Sun is a main-sequence star located in the Milky Way galaxy. It is composed mostly of hydrogen and helium and is powered by nuclear fusion in its core, where hydrogen fuses into helium. The Sun''s gravity holds the planets of the Solar System in orbit, a motion described by Kepler''s laws of planetary motion. In about five billion years the Sun will evolve into a red giant and finally collapse into a white dwarf. Much more massive stars instead end their lives in a supernova, which can leave behind a neutron star or a black hole. Jupiter, the largest planet, was explored by the Galileo spacecraft; the Galileo mission, launched by NASA in 1989, studied the Jovian system and its many moons.'

