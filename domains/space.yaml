# domains/space.yaml - space science / astronomy / astrophysics / aerospace SLM domain.
#
# CANONICAL merged domain (space.yaml). Combines:
#   - the broad, internally-consistent structure + 10-category ontology +
#     relation_sets from the ChatGPT draft (engineering + observational depth), and
#   - the astrophysics relations the draft lacked (composed_of, fuses_into,
#     has_satellite, exerts_gravity_on, collapses_into, undergoes, governed_by,
#     described_by, discovered_by, explored_by, located_at, measured_in, has_phase,
#     predicted_by, proposed_by, studies) + a stellar-evolution worked example,
#     so the same domain serves BOTH an astronomy textbook (OpenStax Astronomy 2e)
#     AND a broad spaceflight/Wikipedia corpus.
#
# Consumed by pipeline_config.py via SI_DOMAIN=space.
#   CORPUS_PATH=corpus/space/source_txt ./scripts/pipeline.sh --profile pilot --domain space
#
# Invariant: relations_allowed_block lists EXACTLY the ids in `relations`, and every
# predicate used in any example/block is a member of `relations`. Verified by
# scripts (cmp_domains-style). relation_sets are curated subsets for experiments
# (NOTE: not yet read by the pipeline — the full `relations` set is what is active).

# --- Required scalar fields ----------------------------------------------
domain: space
description: Specialized SLM for space science — astronomy, astrophysics, planetary science, orbital mechanics, and space engineering

# --- Entity categories ---------------------------------------------------
# 10 main types emitted by the extractor as entity_type values. Subcategories in
# descriptions are extractor guidance only.
entity_categories:
  - id: CELESTIAL_OBJECT
    description: |
      Star; Main-Sequence Star; Red Giant; Planet; Dwarf Planet; Moon; Asteroid;
      Comet; Meteoroid; Exoplanet; Galaxy; Galaxy Cluster; Nebula; Pulsar; Quasar;
      Black Hole; Neutron Star; White Dwarf; Brown Dwarf; Supernova Remnant; Star Cluster

  - id: ASTRONOMICAL_STRUCTURE
    description: |
      Solar System; Planetary System; Asteroid Belt; Kuiper Belt; Oort Cloud;
      Accretion Disk; Ring System; Magnetosphere; Atmosphere; Corona;
      Photosphere; Chromosphere; Interstellar Medium; Cosmic Web

  - id: SPACECRAFT_SYSTEM
    description: |
      Spacecraft; Satellite; Space Probe; Orbiter; Lander; Rover; Space Station;
      Launch Vehicle; Crew Vehicle; Telescope; Payload; CubeSat; Habitat Module;
      Reentry Vehicle; Space Tug

  - id: ENGINEERING_COMPONENT
    description: |
      Rocket Engine; Thruster; Propellant Tank; Solar Panel; Battery; Antenna;
      Reaction Wheel; Gyroscope; Star Tracker; Heat Shield; Radiator; Sensor;
      Camera; Spectrometer; Radar; Communication System; Guidance System

  - id: PHYSICAL_ENTITY
    description: |
      Photon; Particle; Plasma; Cosmic Ray; Solar Wind; Magnetic Field;
      Gravitational Field; Radiation; Dust; Gas; Ice; Regolith; Atmosphere;
      Ion; Molecule; Element (Hydrogen, Helium); Isotope

  - id: PROCESS
    description: |
      Nuclear Fusion; Nucleosynthesis; Gravitational Collapse; Accretion;
      Stellar Evolution; Star Formation; Planet Formation; Orbital Insertion;
      Launch; Docking; Reentry; Atmospheric Entry; Tidal Heating; Erosion;
      Outgassing; Space Weather; Redshift; Gravitational Lensing

  - id: EVENT
    description: |
      Eclipse; Transit; Occultation; Meteor Shower; Solar Flare;
      Coronal Mass Ejection; Supernova; Gamma-Ray Burst; Collision;
      Launch Event; Flyby; Landing; Docking Event; Reentry Event

  - id: MEASUREMENT
    description: |
      Mass; Radius; Diameter; Luminosity; Temperature; Density; Distance;
      Velocity; Acceleration; Orbital Period; Semi-Major Axis; Inclination;
      Eccentricity; Redshift; Magnitude; Albedo; Spectral Line; Frequency;
      Wavelength; Thrust; Specific Impulse; Delta-V

  - id: CONCEPTUAL_ENTITY
    description: |
      Orbit; Trajectory; Habitable Zone; Event Horizon; Roche Limit;
      Lagrange Point; Escape Velocity; Kepler's Laws; General Relativity;
      Newton's Law of Gravitation; Hubble's Law; Dark Matter; Dark Energy;
      Cosmological Constant; Reference Frame; Hohmann Transfer; Gravity Assist;
      Mission Objective

  - id: ORGANIZATION_OR_MISSION
    description: |
      Space Agency; Observatory; Mission; Program; Launch Provider;
      Research Institution; NASA; ESA; ISRO; JAXA; Roscosmos; SpaceX;
      Artemis; Apollo; Voyager; Cassini; Hubble; James Webb Space Telescope

# --- Relations -----------------------------------------------------------
# Active closed vocabulary (67). These are the ONLY allowed predicates in
# extracted triples. relations_allowed_block below MUST list exactly these ids.
relations:
  # Structure / containment / location
  - { id: part_of, description: "Component-to-whole relation; X is structurally or organizationally part of Y." }
  - { id: contains, description: "Whole-to-component relation; X contains Y as a constituent, subsystem, or region." }
  - { id: located_in, description: "X is spatially located in or within Y." }
  - { id: located_at, description: "X is located at distance or position Y." }
  - { id: surrounds, description: "X spatially surrounds or envelops Y." }
  - { id: boundary_of, description: "X is a boundary, limit, or interface of Y." }

  # Orbital / dynamical relations
  - { id: orbits, description: "X gravitationally orbits Y." }
  - { id: orbited_by, description: "Inverse of orbits; X is orbited by Y." }
  - { id: has_satellite, description: "Body X has a natural or artificial satellite Y." }
  - { id: rotates_about, description: "X rotates about an axis or reference frame Y." }
  - { id: gravitationally_bound_to, description: "X is gravitationally bound to Y." }
  - { id: perturbs_orbit_of, description: "X gravitationally or dynamically perturbs the orbit of Y." }
  - { id: exerts_gravity_on, description: "X exerts gravitational force on Y." }
  - { id: transfers_to, description: "Trajectory, spacecraft, or object moves from X to Y via a transfer path." }
  - { id: flies_by, description: "Spacecraft or object performs a flyby of Y." }
  - { id: lands_on, description: "Spacecraft, lander, rover, or object lands on Y." }
  - { id: docks_with, description: "Spacecraft or module docks with Y." }

  # Observation / measurement / detection
  - { id: observes, description: "Instrument, spacecraft, telescope, or mission observes Y." }
  - { id: measures, description: "Instrument, spacecraft, mission, or method measures Y." }
  - { id: measured_in, description: "Quantity X is measured in unit Y." }
  - { id: detects, description: "Instrument, detector, or observation detects Y." }
  - { id: images, description: "Camera, telescope, or mission captures images of Y." }
  - { id: maps, description: "Mission, instrument, or method maps the surface, field, or distribution of Y." }
  - { id: samples, description: "Mission or instrument collects physical samples from Y." }
  - { id: communicates_with, description: "Spacecraft, station, or antenna communicates with Y." }
  - { id: discovered_by, description: "X was discovered by person, instrument, or mission Y." }
  - { id: studies, description: "Mission or instrument X studies target Y." }
  - { id: explored_by, description: "Body X was explored by mission or spacecraft Y." }

  # Physical interactions / composition / emission
  - { id: emits, description: "X emits radiation, particles, fields, or matter Y." }
  - { id: absorbs, description: "X absorbs radiation, particles, or matter Y." }
  - { id: reflects, description: "X reflects radiation or particles Y." }
  - { id: scatters, description: "X scatters radiation or particles Y." }
  - { id: ionizes, description: "X ionizes Y or causes ionization in Y." }
  - { id: heats, description: "X increases the temperature or thermal energy of Y." }
  - { id: accelerates, description: "X accelerates Y or increases Y's velocity/energy." }
  - { id: composed_of, description: "X is composed of material or element Y." }
  - { id: fuses_into, description: "Element X fuses into heavier element Y." }
  - { id: powered_by, description: "Spacecraft, component, or process X is powered by Y." }
  - { id: interacts_with, description: "X physically interacts with Y without stronger causal specificity." }

  # Formation / evolution / causality
  - { id: formed_from, description: "X formed from source material or precursor Y." }
  - { id: evolves_into, description: "X evolves into Y over time." }
  - { id: collapses_into, description: "X gravitationally collapses into remnant Y." }
  - { id: undergoes, description: "Body or system X undergoes process Y." }
  - { id: has_phase, description: "Process X has a stage or phase Y." }
  - { id: causes, description: "X directly causes Y." }
  - { id: results_in, description: "X results in downstream consequence Y." }
  - { id: triggers, description: "X initiates or triggers event/process Y." }
  - { id: associated_with, description: "X is correlated or contextually associated with Y without direct causal commitment." }
  - { id: evidence_for, description: "X provides evidence for hypothesis, object, condition, or process Y." }

  # Engineering / mission / operations
  - { id: launched_by, description: "Mission, spacecraft, or launch vehicle X was launched by organization/provider Y." }
  - { id: launched_from, description: "Mission, spacecraft, or launch vehicle X was launched from site Y." }
  - { id: operated_by, description: "Mission, spacecraft, or instrument X is operated by organization Y." }
  - { id: built_by, description: "Spacecraft, component, or instrument X was built by organization Y." }
  - { id: carries, description: "Spacecraft or mission X carries payload, instrument, or component Y." }
  - { id: propelled_by, description: "Spacecraft X is propelled by propulsion system Y." }
  - { id: uses, description: "System, mission, or process X uses method, component, resource, or concept Y." }
  - { id: controls, description: "System, component, or algorithm X controls Y." }
  - { id: required_for, description: "X is necessary for Y to occur or function." }
  - { id: enables, description: "X enables Y by making it possible or feasible." }
  - { id: fails_due_to, description: "System, mission, or process X fails due to cause Y." }

  # Laws / theory / classification / properties
  - { id: governed_by, description: "Phenomenon X is governed by physical law Y." }
  - { id: described_by, description: "X is described or modeled by theory Y." }
  - { id: predicted_by, description: "X was predicted by theory or model Y." }
  - { id: proposed_by, description: "Theory or model X was proposed by person Y." }
  - { id: type_of, description: "X is a type, subtype, or instance category of Y." }
  - { id: has_property, description: "X has property, parameter, or attribute Y." }
  - { id: characterized_by, description: "X is characterized by measurement, feature, behavior, or signature Y." }

