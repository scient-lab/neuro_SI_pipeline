extract_example_text: 'The James Webb Space Telescope was launched by an Ariane 5 rocket from the Guiana Space Centre. The observatory carries a segmented primary mirror and infrared instruments. These instruments observe distant galaxies and the interstellar medium, and measure redshift, allowing astronomers to study galaxy formation in the early universe. The telescope operates near the Sun-Earth L2 Lagrange point, where the Sun and Earth remain in roughly the same direction from the spacecraft. Its sunshield reduces thermal radiation from the Sun, Earth, and Moon, enabling sensitive infrared observations.'

