# 2_graphmert/launch_configs/args_mlm.yaml — TEMPLATE
#
# All path placeholders below use shell-style ${VAR} syntax. graphmert.sh's
# preprocess and train_mnm steps run `envsubst` against this file at
# pipeline-time and write the resolved YAML to
#   ${GRAPHMERT_DIR}/args_mlm.resolved.yaml
# The Python scripts (run_dataset_preprocessing.py, run_mlm.py) ONLY ever
# see the resolved file.
#
# Variables expected in the environment:
#   GRAPHMERT_DIR     graphmert outputs root (= $OUTPUT_BASE/graphmert)
#   STABLE_TOKENIZER  ${GRAPHMERT_DIR}/stable_tokenizer
#   SEED_KG_CSV       ${GRAPHRAG_DIR}/output/kg_final.csv

# ===================== MODEL & CONFIG =====================
# GraphMERT architecture (paper configuration):
#   root_nodes = max_seq_length = 512   <- now in configs/profiles/*.yaml :: graphmert.config.root_nodes
#   num_leaves = 3                       <- now in configs/profiles/*.yaml :: graphmert.config.num_leaves
#   max_nodes  = 512 * (1 + 3) = 2048    <- derived in 2_graphmert/utils/architecture.py
#
# root_nodes and max_nodes are NO LONGER set via config_overrides — they
# are applied to GraphMertConfig by mlm_utils.main() from
# utils/architecture.py (which reads the active profile YAML). Keeping
# them here would silently double-set and confuse Part 3 of the config
# refactor. The remaining knobs (layers/heads/hidden/ffn/embeds) are
# still hardcoded — Part 3 will surface those per-profile as well.
#
# mlm_sbo INTENTIONALLY DIFFERS from graphmert_umls (which sets True):
# our fork's mlm_utils.py:239 wires a custom GraphMertTailSlotDataCollator
# (mlm_utils.py:102) that implements a tail-slot training objective and
# does NOT emit `pairs` / `pair_labels` in the batch. If mlm_sbo were
# True, modeling_graphmert.py:1203-1204 would call lm_pair_head(outputs,
# pairs) with pairs=None and crash. Setting mlm_sbo=False here aligns the
# model config with what the collator actually produces. See commit log
# (2026-06-22) for the diagnosis.
config_overrides: "num_hidden_layers=6,num_attention_heads=12,hidden_size=768,intermediate_size=3072,pretrained_emb_dim=0,mlm_sbo=false"
warmup_ratio: 0.06

model_type: graphmert
model_name_or_path: null
config_name: null
model_revision: main

use_fast_tokenizer: false

cache_dir: ${GRAPHMERT_DIR}/mlm_cache

# ===================== DATA FILES =====================
train_file: null
validation_file: null

# ===================== PREPROCESSING =====================
# Where run_dataset_preprocessing.py writes its outputs.
preprocessing_output_root: ${GRAPHMERT_DIR}/dataset

# Outputs of clean_llm_relations.py (flat layout under llm_relations/).
train_src: ${GRAPHMERT_DIR}/llm_relations/relations_cleaned_train
eval_src:  ${GRAPHMERT_DIR}/llm_relations/relations_cleaned_eval

# Seed KG from graphrag (CSV variant for pd.read_csv).
injections_train_path: ${SEED_KG_CSV}
injections_eval_path:  ${SEED_KG_CSV}

# Written by run_dataset_preprocessing.py (step 4) for run_mlm.py (step 5).
relation_map_path: ${GRAPHMERT_DIR}/dataset/relation_map.json

preprocessing_num_workers: 0
overwrite_cache: true

# ===================== GRAPHMERT SETTINGS =====================
num_relationships: 43
graph_types:
  - root_undirected
  - leaf_undirected
  - leaf_connected_undirected

relation_emb_dropout: 0.3
# See config_overrides comment block above for why mlm_sbo=false in this
# fork (custom GraphMertTailSlotDataCollator does not emit SBO pairs).
mlm_sbo: false
mlm_probability: 0.15
mlm_on_leaves_probability: 0.15
span_upper_length: 2

# ===================== TOKENIZER =====================
tokenizer_name: ${STABLE_TOKENIZER}
subword_token_start: "##"
use_auth_token: false

# ===================== DATA TRAINING ARGS =====================
dataset_name: null
dataset_config_name: null
validation_split_percentage: 5
max_seq_length: 512

# ===================== TRAINING =====================
output_dir: ${GRAPHMERT_DIR}/mlm_output
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16
num_train_epochs: 20
warmup_ratio: 0.06
weight_decay: 0.01

# LR search: try these values first (0.25–2 epochs each), then pick best
lrs: [0.0004, 0.0005]

dataloader_num_workers: 0
dataloader_prefetch_factor: null

# ===================== EVALUATION =====================
# transformers >=4.41 renamed evaluation_strategy → eval_strategy. The old
# name is silently ignored, defaulting eval_strategy to "no" and breaking
# load_best_model_at_end which requires save+eval strategies to match.
eval_strategy: steps
logging_strategy: steps
save_strategy: steps
eval_steps: 25
logging_steps: 5
save_steps: 100

# load_best_model_at_end requires eval to produce `metric_for_best_model`
# on every eval step. At smoke scale (eval N ≈ 2) the TailSlot collator's
# random head-position picker (mlm_utils.py:111 _pick_head_pos) can
# legitimately return None for every eval row — no masked positions →
# labels all -100 → CrossEntropyLoss output isn't recorded as `eval_loss`
# in HF Trainer's metrics dict → _determine_best_metric crashes with
# KeyError. Disable best-model selection here; flip back to true on
# pilot/paper profiles where eval splits have enough rows for the picker
# to reliably select a position. metric_for_best_model / greater_is_better
# kept declaratively so re-enabling is a 1-line flip.
load_best_model_at_end: false
metric_for_best_model: eval_loss
greater_is_better: false

lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr: 1.0e-5
bf16: true
seed: 0
do_train: true
do_eval: true
do_predict: false
overwrite_output_dir: true
resume_from_checkpoint: false
remove_unused_columns: false
save_safetensors: false
save_total_limit: 4
log_level: info
