# RunPod available GPU types — catalog for scripts/runpod/launch.sh.
#
# Source: RunPod GPU availability list, captured 2026-06-29.
# `name` strings are VERBATIM RunPod API `displayName` values — including the
# duplicate / variant spellings the API returns (double spaces, "RTX 3080TI",
# "NVIDIA RTX A30"); any name-matching code MUST use them exactly as written.
# `vram_gb` = on-board VRAM, used for the profile VRAM bands (launch.sh tries
# high VRAM first). Values marked `# approx` are the well-known chip spec but
# were not confirmed against this RunPod listing — verify before relying on them.
#
# Profile VRAM bands (configs/profiles/*.yaml):
#   smoke : 32-48 GB     pilot : 80-96 GB     paper : 96-288 GB
# Entries below 32 GB do not satisfy any current profile band (listed for
# completeness / single-step local-style runs).

